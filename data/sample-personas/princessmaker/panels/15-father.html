<panel-actions>
[
  {
    "id": "talk_to_father",
    "label": "아빠와 대화",
    "description": "아빠와 대화한다. 다정하게 또는 엄하게. 랜덤 주제로 스탯 변동. 월 1회 무료.",
    "params": {
      "mode": "대화 모드 (warm/strict)"
    },
    "available_when": "turn_phase === 'setup' && !father_talked"
  }
]
</panel-actions>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');

  :host {
    font-family: 'Noto Sans KR', sans-serif;
    display: block;
    width: 100%;
  }

  .fthr {
    background: linear-gradient(160deg, #1e1833 0%, #16112a 100%);
    border: 1px solid rgba(232,160,191,0.12);
    border-radius: 14px;
    overflow: hidden;
  }

  .fthr-hdr {
    padding: 16px 20px 12px;
    border-bottom: 1px solid rgba(232,160,191,0.06);
    position: relative;
    overflow: hidden;
  }
  .fthr-hdr::before {
    content: '';
    position: absolute;
    top: -30px; left: 20%;
    width: 60%; height: 80px;
    background: radial-gradient(ellipse, rgba(255,200,100,0.06) 0%, transparent 70%);
    pointer-events: none;
  }
  .fthr-title {
    font-size: 14px;
    font-weight: 700;
    color: #f0e8f5;
    margin-bottom: 4px;
  }
  .fthr-sub {
    font-size: 10px;
    color: #776688;
    line-height: 1.4;
  }
  .fthr-badge {
    display: inline-block;
    font-size: 8px;
    font-weight: 900;
    letter-spacing: 2px;
    color: #f0c060;
    background: rgba(240,192,96,0.06);
    border: 1px solid rgba(240,192,96,0.15);
    border-radius: 20px;
    padding: 2px 10px;
    margin-bottom: 8px;
  }

  .fthr-modes {
    padding: 12px;
    display: flex;
    gap: 10px;
  }

  .fthr-mode {
    flex: 1;
    background: rgba(255,255,255,0.015);
    border: 1.5px solid rgba(255,255,255,0.04);
    border-radius: 14px;
    padding: 16px 14px;
    cursor: pointer;
    transition: all 0.18s ease-out;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .fthr-mode:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(0,0,0,0.3);
  }
  .fthr-mode.warm:hover {
    background: rgba(255,180,100,0.06);
    border-color: rgba(255,180,100,0.25);
  }
  .fthr-mode.strict:hover {
    background: rgba(100,150,255,0.06);
    border-color: rgba(100,150,255,0.25);
  }
  .fthr-mode:active {
    transform: translateY(0) scale(0.98);
  }
  .fthr-mode.selected {
    box-shadow: 0 0 20px rgba(240,192,96,0.15);
  }
  .fthr-mode.selected.warm {
    border-color: rgba(255,180,100,0.4);
    background: rgba(255,180,100,0.08);
  }
  .fthr-mode.selected.strict {
    border-color: rgba(100,150,255,0.4);
    background: rgba(100,150,255,0.08);
  }
  .fthr-mode.dimmed {
    opacity: 0.2;
    pointer-events: none;
  }
  .fthr-mode-ico {
    font-size: 28px;
    margin-bottom: 8px;
  }
  .fthr-mode-name {
    font-size: 13px;
    font-weight: 700;
    color: #f0e8f5;
    margin-bottom: 4px;
  }
  .fthr-mode-desc {
    font-size: 10px;
    color: #9080aa;
    line-height: 1.4;
  }

  /* Result reveal */
  .fthr-result {
    padding: 14px 16px;
    text-align: center;
  }
  .fthr-result-topic {
    font-size: 13px;
    font-weight: 700;
    color: #f0c060;
    margin-bottom: 10px;
  }
  .fthr-result-effects {
    font-size: 11px;
    min-height: 20px;
  }
  .fthr-result-effects .up { color: #6ee09a; }
  .fthr-result-effects .dn { color: #f08098; }
  .fthr-eff-pop {
    display: inline-block;
    animation: fthrEffPop 0.35s ease-out;
    font-weight: 700;
    padding: 2px 6px;
    border-radius: 6px;
    background: rgba(255,255,255,0.04);
    margin: 2px;
  }
  @keyframes fthrEffPop {
    0% { opacity: 0; transform: translateY(8px) scale(0.8); }
    60% { opacity: 1; transform: translateY(-2px) scale(1.05); }
    100% { opacity: 1; transform: translateY(0) scale(1); }
  }

  .fthr-done {
    padding: 20px;
    text-align: center;
    color: #776688;
    font-size: 12px;
  }
  .fthr-done-ico {
    font-size: 28px;
    margin-bottom: 8px;
  }
</style>

<!-- {{turn_phase}}:{{guardian_background}}:{{stance}} -->
<div class="fthr" id="fatherPanel"></div>

<script>
  const d = __panelBridge.data;
  const el = shadow.querySelector('#fatherPanel');
  const gs = d['game-state'] || {};
  const talked = gs.father_talked_this_month || false;

  const STAT_NM = {
    stamina:'체력', intelligence:'지력', elegance:'기품', charm:'매력',
    morals:'도덕', sensitivity:'감수성', faith:'신앙', combat:'무술',
    etiquette:'예절', cooking:'요리', art:'예술', music:'음악',
    stress:'스트레스', hp:'HP', attack:'공격', defense:'방어',
    magic_power:'마력', gold:'골드'
  };

  if (talked) {
    el.innerHTML = `
      <div class="fthr-hdr">
        <div class="fthr-badge">아빠와 대화</div>
        <div class="fthr-title">이번 달 대화 완료</div>
      </div>
      <div class="fthr-done">
        <div class="fthr-done-ico">✅</div>
        이번 달에는 이미 아빠와 대화했습니다.<br>다음 달에 다시 대화할 수 있어요.
      </div>`;
    return;
  }

  let h = '';
  h += '<div class="fthr-hdr">';
  h += '<div class="fthr-badge">아빠와 대화</div>';
  h += '<div class="fthr-title">아빠에게 어떻게 다가갈까?</div>';
  h += '<div class="fthr-sub">월 1회 무료 · 랜덤 대화 주제</div>';
  h += '</div>';

  h += '<div class="fthr-modes">';
  h += `<div class="fthr-mode warm" data-mode="warm">
    <div class="fthr-mode-ico">🤗</div>
    <div class="fthr-mode-name">다정하게 대하기</div>
    <div class="fthr-mode-desc">함께 놀거나, 이야기를 나누거나, 칭찬을 받거나</div>
  </div>`;
  h += `<div class="fthr-mode strict" data-mode="strict">
    <div class="fthr-mode-ico">📖</div>
    <div class="fthr-mode-name">엄하게 가르치기</div>
    <div class="fthr-mode-desc">무술을 배우거나, 공부를 점검받거나, 훈화를 듣거나</div>
  </div>`;
  h += '</div>';

  h += '<div class="fthr-result" id="fthrResult" style="display:none;"></div>';

  el.innerHTML = h;

  // Register panel action
  __panelBridge.registerAction('talk_to_father', async (params) => {
    const mode = params && params.mode;
    if (!mode) return;

    // Visual feedback
    const modes = shadow.querySelectorAll('.fthr-mode');
    modes.forEach(m => m.classList.add('dimmed'));
    const target = shadow.querySelector(`.fthr-mode[data-mode="${mode}"]`);
    if (target) {
      target.classList.remove('dimmed');
      target.classList.add('selected');
    }

    await new Promise(r => setTimeout(r, 600));

    // Call engine
    const res = await __panelBridge.runTool('engine', { action: 'talk_to_father', mode });
    if (!res.result?.success) return;

    const r = res.result;

    // Show result area
    const resultEl = shadow.querySelector('#fthrResult');
    if (resultEl) {
      resultEl.style.display = '';
      resultEl.innerHTML = `<div class="fthr-result-topic">💬 ${r.topic_name}</div><div class="fthr-result-effects" id="fthrEffects"></div>`;

      // Reveal effects one by one
      const effectsEl = shadow.querySelector('#fthrEffects');
      if (effectsEl && r.effects) {
        const entries = Object.entries(r.effects).filter(([k, v]) => v !== 0);
        for (let i = 0; i < entries.length; i++) {
          await new Promise(r => setTimeout(r, 750));
          const [k, v] = entries[i];
          const nm = STAT_NM[k] || k;
          const cls = (k === 'stress' ? (v > 0 ? 'dn' : 'up') : (v > 0 ? 'up' : 'dn'));
          const span = document.createElement('span');
          span.className = cls + ' fthr-eff-pop';
          span.textContent = `${nm}${v > 0 ? '+' : ''}${v}`;
          effectsEl.appendChild(span);
        }
      }
    }

    // Wait 2s then close and send
    await new Promise(r => setTimeout(r, 2000));

    // Build event header
    let effStr = '';
    if (r.effects) {
      effStr = Object.entries(r.effects)
        .filter(([k, v]) => v !== 0)
        .map(([k, v]) => `${STAT_NM[k]||k}${v>0?'+':''}${v}`)
        .join(', ');
    }

    const header = `[FATHER_TALK]\n주제: ${r.topic_name}\n효과: ${effStr}`;
    await __panelBridge.queueEvent(header);
    await __panelBridge.closeModal('father');
    __panelBridge.sendMessage(`아빠한테 ${r.topic_name} 이야기를 했다!`);
  });

  // Click handlers delegate to panel action
  shadow.querySelectorAll('.fthr-mode').forEach(card => {
    card.addEventListener('click', () => {
      const mode = card.dataset.mode;
      __panelBridge.executeAction('talk_to_father', { mode });
    });
  });
</script>
