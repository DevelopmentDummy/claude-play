<panel-actions>
[
  {
    "id": "talk_to_father",
    "label": "아빠와 대화",
    "description": "아빠와 대화한다. 주제에 따라 소폭 스탯 변동. 월 1회 무료.",
    "params": {
      "topic": "대화 주제 (martial/study/life/play)"
    },
    "available_when": "turn_phase === 'setup'"
  }
]
</panel-actions>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');

  :host {
    font-family: 'Noto Sans KR', sans-serif;
    display: block;
    width: 100%;
  }

  .fthr {
    background: linear-gradient(160deg, #1e1833 0%, #16112a 100%);
    border: 1px solid rgba(232,160,191,0.12);
    border-radius: 14px;
    overflow: hidden;
  }

  .fthr-hdr {
    padding: 16px 20px 12px;
    border-bottom: 1px solid rgba(232,160,191,0.06);
    position: relative;
    overflow: hidden;
  }
  .fthr-hdr::before {
    content: '';
    position: absolute;
    top: -30px; left: 20%;
    width: 60%; height: 80px;
    background: radial-gradient(ellipse, rgba(255,200,100,0.06) 0%, transparent 70%);
    pointer-events: none;
  }
  .fthr-title {
    font-size: 14px;
    font-weight: 700;
    color: #f0e8f5;
    margin-bottom: 4px;
  }
  .fthr-sub {
    font-size: 10px;
    color: #776688;
    line-height: 1.4;
  }
  .fthr-badge {
    display: inline-block;
    font-size: 8px;
    font-weight: 900;
    letter-spacing: 2px;
    color: #f0c060;
    background: rgba(240,192,96,0.06);
    border: 1px solid rgba(240,192,96,0.15);
    border-radius: 20px;
    padding: 2px 10px;
    margin-bottom: 8px;
  }

  .fthr-topics {
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .fthr-card {
    background: rgba(255,255,255,0.015);
    border: 1.5px solid rgba(255,255,255,0.04);
    border-radius: 12px;
    padding: 12px 16px;
    cursor: pointer;
    transition: all 0.18s ease-out;
    position: relative;
    overflow: hidden;
  }
  .fthr-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: rgba(240,192,96,0.0);
    transition: background 0.18s;
    border-radius: 3px 0 0 3px;
  }
  .fthr-card:hover {
    background: rgba(240,192,96,0.04);
    border-color: rgba(240,192,96,0.2);
    transform: translateX(4px);
    box-shadow: 0 4px 16px rgba(0,0,0,0.25);
  }
  .fthr-card:hover::before {
    background: #f0c060;
  }
  .fthr-card:active {
    transform: translateX(2px) scale(0.99);
    transition-duration: 0.06s;
  }
  .fthr-card.disabled {
    opacity: 0.3;
    pointer-events: none;
  }
  .fthr-card.selected {
    border-color: rgba(240,192,96,0.4);
    background: rgba(240,192,96,0.06);
    box-shadow: 0 0 20px rgba(240,192,96,0.1);
  }
  .fthr-card.selected::before {
    background: #f0c060;
  }
  .fthr-card.dimmed {
    opacity: 0.25;
    pointer-events: none;
  }

  .fthr-card-top {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .fthr-card-ico {
    font-size: 18px;
  }
  .fthr-card-name {
    font-size: 13px;
    font-weight: 600;
    color: #e8e0f0;
  }
  .fthr-card-bonus {
    margin-left: auto;
    font-size: 9px;
    color: #f0c060;
    background: rgba(240,192,96,0.08);
    border-radius: 10px;
    padding: 2px 8px;
  }
  .fthr-card-desc {
    font-size: 10px;
    color: #9080aa;
    margin-top: 4px;
    line-height: 1.4;
  }
  .fthr-card-effects {
    font-size: 9px;
    color: #665577;
    margin-top: 4px;
  }
  .fthr-card-effects .up { color: #6ee09a; }
  .fthr-card-effects .dn { color: #f08098; }

  .fthr-done {
    padding: 20px;
    text-align: center;
    color: #776688;
    font-size: 12px;
  }
  .fthr-done-ico {
    font-size: 28px;
    margin-bottom: 8px;
  }
</style>

<!-- {{turn_phase}}:{{guardian_background}} -->
<div class="fthr" id="fatherPanel"></div>

<script>
  const d = __panelBridge.data;
  const el = shadow.querySelector('#fatherPanel');
  const gs = d['game-state'] || {};
  const talked = gs.father_talked_this_month || false;
  const bg = d.guardian_background || 'hero';

  const STAT_NM = {
    stamina:'체력', intelligence:'지력', elegance:'기품', charm:'매력',
    morals:'도덕', sensitivity:'감수성', faith:'신앙', combat:'무술',
    etiquette:'예절', cooking:'요리', art:'예술', music:'음악',
    stress:'스트레스', hp:'HP', attack:'공격', defense:'방어',
    magic_power:'마력'
  };

  const BG_NM = {
    hero: '전직 용사', merchant: '전직 상인', noble: '전직 귀족',
    wizard: '전직 마법사', scholar: '전직 학자', artist: '전직 예술가',
    knight: '전직 기사', priest: '전직 사제', courtesan: '전직 기녀'
  };

  const TOPICS = {
    martial: {
      name: '무술 지도',
      ico: '⚔️',
      desc: '아빠에게 무술을 배운다.',
      base: { combat: 3, stamina: 2, stress: -3 },
      bonus: { hero: { combat: 3, attack: 1 }, knight: { combat: 2, defense: 1 } }
    },
    study: {
      name: '학업 격려',
      ico: '📚',
      desc: '아빠와 함께 공부한다.',
      base: { intelligence: 3, morals: 1, stress: -2 },
      bonus: { scholar: { intelligence: 3 }, wizard: { magic_power: 2 } }
    },
    life: {
      name: '인생 상담',
      ico: '💬',
      desc: '아빠에게 고민을 이야기한다.',
      base: { morals: 3, sensitivity: 2, stress: -5 },
      bonus: { priest: { faith: 3, morals: 2 }, noble: { elegance: 2 } }
    },
    play: {
      name: '함께 놀기',
      ico: '🎈',
      desc: '아빠와 신나게 논다.',
      base: { charm: 2, stress: -8 },
      bonus: { artist: { art: 2, sensitivity: 1 }, merchant: { charm: 2 } }
    }
  };

  if (talked) {
    el.innerHTML = `
      <div class="fthr-hdr">
        <div class="fthr-badge">아빠와 대화</div>
        <div class="fthr-title">이번 달 대화 완료</div>
      </div>
      <div class="fthr-done">
        <div class="fthr-done-ico">✅</div>
        이번 달에는 이미 아빠와 대화했습니다.<br>다음 달에 다시 대화할 수 있어요.
      </div>`;
    return;
  }

  let h = '';
  h += '<div class="fthr-hdr">';
  h += '<div class="fthr-badge">아빠와 대화</div>';
  h += `<div class="fthr-title">아빠와 무슨 이야기를 할까?</div>`;
  h += `<div class="fthr-sub">월 1회 무료 · ${BG_NM[bg] || bg} 보너스 적용</div>`;
  h += '</div>';

  h += '<div class="fthr-topics">';
  for (const [topicId, t] of Object.entries(TOPICS)) {
    const bonusEffects = (t.bonus || {})[bg] || {};
    const hasBonus = Object.keys(bonusEffects).length > 0;

    // Merge base + bonus for preview
    const merged = { ...t.base };
    for (const [k, v2] of Object.entries(bonusEffects)) {
      merged[k] = (merged[k] || 0) + v2;
    }

    let effHtml = '';
    const parts = [];
    for (const [k, v2] of Object.entries(merged)) {
      const nm = STAT_NM[k] || k;
      const cls = (k === 'stress' ? (v2 > 0 ? 'dn' : 'up') : (v2 > 0 ? 'up' : 'dn'));
      parts.push(`<span class="${cls}">${nm}${v2 > 0 ? '+' : ''}${v2}</span>`);
    }
    effHtml = parts.join(' ');

    h += `<div class="fthr-card" data-topic="${topicId}">
      <div class="fthr-card-top">
        <span class="fthr-card-ico">${t.ico}</span>
        <span class="fthr-card-name">${t.name}</span>
        ${hasBonus ? `<span class="fthr-card-bonus">★ ${BG_NM[bg] || bg} 보너스</span>` : ''}
      </div>
      <div class="fthr-card-desc">${t.desc}</div>
      <div class="fthr-card-effects">${effHtml}</div>
    </div>`;
  }
  h += '</div>';

  el.innerHTML = h;

  // Register panel action
  __panelBridge.registerAction('talk_to_father', async (params) => {
    const topic = params && params.topic;
    if (!topic) return;

    // Visual feedback
    const cards = shadow.querySelectorAll('.fthr-card');
    cards.forEach(c => c.classList.add('dimmed'));
    const target = shadow.querySelector(`.fthr-card[data-topic="${topic}"]`);
    if (target) {
      target.classList.remove('dimmed');
      target.classList.add('selected');
    }

    await new Promise(r => setTimeout(r, 500));

    // Call engine
    const res = await __panelBridge.runTool('engine', { action: 'talk_to_father', topic });
    if (!res.result?.success) return;

    const r = res.result;
    const topicDef = TOPICS[topic];

    // Build event header
    let effStr = '';
    if (r.effects) {
      effStr = Object.entries(r.effects)
        .filter(([k, v]) => v !== 0)
        .map(([k, v]) => `${STAT_NM[k]||k}${v>0?'+':''}${v}`)
        .join(', ');
    }

    const header = `[FATHER_TALK]\n주제: ${topicDef ? topicDef.name : topic}\n효과: ${effStr}${r.background_bonus ? '\n★ ' + (BG_NM[r.background_bonus] || r.background_bonus) + ' 보너스 적용' : ''}`;
    await __panelBridge.queueEvent(header);
    await __panelBridge.closeModal('father');
    __panelBridge.sendMessage(`아빠한테 ${topicDef ? topicDef.name : topic} 이야기를 했다!`);
  });

  // Click handlers delegate to panel action
  shadow.querySelectorAll('.fthr-card').forEach(card => {
    card.addEventListener('click', () => {
      const topic = card.dataset.topic;
      __panelBridge.executeAction('talk_to_father', { topic });
    });
  });
</script>
