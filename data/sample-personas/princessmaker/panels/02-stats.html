<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');
  :host { font-family: 'Noto Sans KR', sans-serif; }

  .stats-panel {
    background: linear-gradient(135deg, #2a1f3d 0%, #1e1630 100%);
    border-radius: 12px;
    padding: 14px;
  }
  .panel-title {
    font-size: 11px;
    font-weight: 700;
    color: #e8a0bf;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  /* title line moved to .title-line element */

  .stat-group {
    margin-bottom: 12px;
  }
  .group-label {
    font-size: 10px;
    color: #9988aa;
    margin-bottom: 6px;
    padding-left: 2px;
  }

  .stat-row {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 5px;
  }
  .stat-name {
    width: 42px;
    font-size: 11px;
    color: #c8b8d8;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 2px;
  }
  .mod-indicator {
    font-size: 8px;
    font-weight: 700;
    line-height: 1;
  }
  .mod-up { color: #6ee09a; }
  .mod-down { color: #f07070; }
  .stat-bar {
    flex: 1;
    height: 7px;
    background: rgba(255,255,255,0.05);
    border-radius: 4px;
    overflow: hidden;
  }
  .stat-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.4s ease;
    min-width: 2px;
  }
  .stat-val {
    width: 30px;
    font-size: 10px;
    color: #9988aa;
    text-align: right;
    flex-shrink: 0;
  }

  /* 카테고리별 색상 */
  .fill-stamina { background: linear-gradient(90deg, #4dcc7a, #2ecc71); }
  .fill-intel { background: linear-gradient(90deg, #5b9cf5, #3b7dd8); }
  .fill-elegance { background: linear-gradient(90deg, #c88fe8, #a66cc8); }
  .fill-charm { background: linear-gradient(90deg, #f5a0c0, #e87da0); }
  .fill-morals { background: linear-gradient(90deg, #f5d76e, #d4b84a); }
  .fill-sensitivity { background: linear-gradient(90deg, #7ecccc, #5aadad); }
  .fill-faith { background: linear-gradient(90deg, #c8c8f5, #a0a0e0); }
  .fill-combat { background: linear-gradient(90deg, #f07070, #d04545); }
  .fill-etiquette { background: linear-gradient(90deg, #d8a0e8, #b87cc8); }
  .fill-cooking { background: linear-gradient(90deg, #f5c078, #e8a050); }
  .fill-art { background: linear-gradient(90deg, #78d8f5, #50b8e0); }
  .fill-music { background: linear-gradient(90deg, #b8a0f5, #9878e0); }

  .combat-stats {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 6px;
    margin-top: 4px;
  }
  .combat-box {
    background: rgba(255,255,255,0.04);
    border-radius: 6px;
    padding: 5px 8px;
    text-align: center;
  }
  .combat-label {
    font-size: 9px;
    color: #9988aa;
  }
  .combat-value {
    font-size: 13px;
    font-weight: 700;
    color: #f0e8f5;
    margin-top: 1px;
  }

  .title-line {
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, rgba(232,160,191,0.3), transparent);
  }
  .gear-btn {
    background: none;
    border: none;
    color: #554466;
    font-size: 13px;
    cursor: pointer;
    padding: 2px 5px;
    border-radius: 4px;
    transition: all 0.2s;
    flex-shrink: 0;
    line-height: 1;
  }
  .gear-btn:hover { color: #e8a0bf; background: rgba(232,160,191,0.1); }
</style>

<div class="stats-panel">
  <div class="panel-title">
    <span>✦ 능력치</span>
    <span class="title-line"></span>
    <button class="gear-btn" id="gearBtn">⚙</button>
  </div>

  <div class="stat-group">
    <div class="group-label">기본 능력</div>
    <div class="stat-row">
      <span class="stat-name">체력</span>
      <div class="stat-bar"><div class="stat-fill fill-stamina" style="width:{{percentage stamina stamina_max}}%"></div></div>
      <span class="stat-val">{{stamina}}</span>
    </div>
    <div class="stat-row">
      <span class="stat-name">지력</span>
      <div class="stat-bar"><div class="stat-fill fill-intel" style="width:{{percentage intelligence intelligence_max}}%"></div></div>
      <span class="stat-val">{{intelligence}}</span>
    </div>
    <div class="stat-row">
      <span class="stat-name">기품</span>
      <div class="stat-bar"><div class="stat-fill fill-elegance" style="width:{{percentage elegance elegance_max}}%"></div></div>
      <span class="stat-val">{{elegance}}</span>
    </div>
    <div class="stat-row">
      <span class="stat-name">매력</span>
      <div class="stat-bar"><div class="stat-fill fill-charm" style="width:{{percentage charm charm_max}}%"></div></div>
      <span class="stat-val">{{charm}}</span>
    </div>
    <div class="stat-row">
      <span class="stat-name">도덕</span>
      <div class="stat-bar"><div class="stat-fill fill-morals" style="width:{{percentage morals morals_max}}%"></div></div>
      <span class="stat-val">{{morals}}</span>
    </div>
    <div class="stat-row">
      <span class="stat-name">감수성</span>
      <div class="stat-bar"><div class="stat-fill fill-sensitivity" style="width:{{percentage sensitivity sensitivity_max}}%"></div></div>
      <span class="stat-val">{{sensitivity}}</span>
    </div>
    <div class="stat-row">
      <span class="stat-name">신앙</span>
      <div class="stat-bar"><div class="stat-fill fill-faith" style="width:{{percentage faith faith_max}}%"></div></div>
      <span class="stat-val">{{faith}}</span>
    </div>
  </div>

  <div class="stat-group">
    <div class="group-label">기능 스킬</div>
    <div class="stat-row">
      <span class="stat-name">무술</span>
      <div class="stat-bar"><div class="stat-fill fill-combat" style="width:{{percentage combat combat_max}}%"></div></div>
      <span class="stat-val">{{combat}}</span>
    </div>
    <div class="stat-row">
      <span class="stat-name">예절</span>
      <div class="stat-bar"><div class="stat-fill fill-etiquette" style="width:{{percentage etiquette etiquette_max}}%"></div></div>
      <span class="stat-val">{{etiquette}}</span>
    </div>
    <div class="stat-row">
      <span class="stat-name">요리</span>
      <div class="stat-bar"><div class="stat-fill fill-cooking" style="width:{{percentage cooking cooking_max}}%"></div></div>
      <span class="stat-val">{{cooking}}</span>
    </div>
    <div class="stat-row">
      <span class="stat-name">예술</span>
      <div class="stat-bar"><div class="stat-fill fill-art" style="width:{{percentage art art_max}}%"></div></div>
      <span class="stat-val">{{art}}</span>
    </div>
    <div class="stat-row">
      <span class="stat-name">음악</span>
      <div class="stat-bar"><div class="stat-fill fill-music" style="width:{{percentage music music_max}}%"></div></div>
      <span class="stat-val">{{music}}</span>
    </div>
  </div>

  <div class="stat-group">
    <div class="group-label">전투 스탯</div>
    <div class="combat-stats">
      <div class="combat-box">
        <div class="combat-label">공격</div>
        <div class="combat-value" id="atkVal"></div>
      </div>
      <div class="combat-box">
        <div class="combat-label">방어</div>
        <div class="combat-value" id="defVal"></div>
      </div>
      <div class="combat-box">
        <div class="combat-label">마력</div>
        <div class="combat-value" id="magVal"></div>
      </div>
    </div>
  </div>
</div>

<script>
  const d = __panelBridge.data;
  const inv = d.inventory || {};
  const equip = inv.equipment || {};
  const catalog = inv.shop_catalog || {};

  function equipBonus(stat) {
    let bonus = 0;
    for (const slotItem of Object.values(equip)) {
      if (slotItem) {
        const info = catalog[slotItem];
        if (info?.stats?.[stat]) bonus += info.stats[stat];
      }
    }
    return bonus;
  }

  const baseAtk = Math.floor(d.attack || 0), atkBonus = equipBonus('attack');
  const baseDef = Math.floor(d.defense || 0), defBonus = equipBonus('defense');
  const baseMag = Math.floor(d.magic_power || 0);

  function fmt(base, bonus) {
    return bonus > 0 ? `${base} <span style="font-size:9px;color:#6ee09a">+${bonus}</span>` : `${base}`;
  }

  shadow.querySelector('#atkVal').innerHTML = fmt(baseAtk, atkBonus);
  shadow.querySelector('#defVal').innerHTML = fmt(baseDef, defBonus);
  shadow.querySelector('#magVal').innerHTML = fmt(baseMag, 0);

  shadow.querySelector('#gearBtn')?.addEventListener('click', () => {
    __panelBridge.openModal('options', 'dismissible');
  });

  // Dynamic gauge scale: MIN(999, MAX(all stats) + 100)
  const scaleStats = ['stamina','intelligence','elegance','charm','morals','sensitivity',
    'faith','combat','etiquette','cooking','art','music'];
  let maxStat = 0;
  for (const s of scaleStats) {
    if ((d[s] || 0) > maxStat) maxStat = d[s] || 0;
  }
  const gaugeMax = Math.min(999, maxStat + 100);

  // Stat modifier indicators
  const mods = d.__stat_modifiers || {};

  shadow.querySelectorAll('.stat-fill').forEach(el => {
    // Extract stat key from class name (fill-stamina -> stamina, fill-intel -> intelligence)
    const cls = [...el.classList].find(c => c.startsWith('fill-'));
    if (!cls) return;
    const key = cls.replace('fill-', '');
    const statMap = { intel: 'intelligence' };
    const statKey = statMap[key] || key;
    const val = d[statKey] || 0;
    // Use raw float for smooth gauge bar width
    el.style.width = Math.min(100, (val / gaugeMax) * 100) + '%';

    // Floor the displayed stat number
    const row = el.closest('.stat-row');
    if (row) {
      const valSpan = row.querySelector('.stat-val');
      if (valSpan) valSpan.textContent = Math.floor(val);

      // Add modifier indicator next to stat name
      const mod = mods[statKey];
      if (mod != null && mod !== 1.0) {
        const nameSpan = row.querySelector('.stat-name');
        if (nameSpan && !nameSpan.querySelector('.mod-indicator')) {
          const indicator = document.createElement('span');
          indicator.className = 'mod-indicator ' + (mod > 1.0 ? 'mod-up' : 'mod-down');
          indicator.textContent = mod > 1.0 ? '↑' : '↓';
          indicator.title = `x${mod.toFixed(2)}`;
          nameSpan.appendChild(indicator);
        }
      }
    }
  });
</script>
