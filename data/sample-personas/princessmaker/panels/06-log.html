<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500&display=swap');
  :host { font-family: 'Noto Sans KR', sans-serif; }

  .log-panel {
    background: linear-gradient(135deg, #2a1f3d 0%, #1e1630 100%);
    border-radius: 12px;
    padding: 14px;
  }
  .log-title {
    font-size: 11px;
    font-weight: 700;
    color: #e8a0bf;
    letter-spacing: 1px;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .log-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, rgba(232,160,191,0.3), transparent);
  }

  .log-entries {
    max-height: 240px;
    overflow-y: auto;
  }
  .log-entries::-webkit-scrollbar { width: 4px; }
  .log-entries::-webkit-scrollbar-track { background: transparent; }
  .log-entries::-webkit-scrollbar-thumb { background: rgba(232,160,191,0.2); border-radius: 2px; }

  .log-entry {
    padding: 6px 8px;
    border-left: 2px solid;
    margin-bottom: 6px;
    border-radius: 0 6px 6px 0;
    background: rgba(255,255,255,0.02);
  }
  .log-entry.turn { border-color: #5b9cf5; }
  .log-entry.adventure { border-color: #f07070; }
  .log-entry.unlock { border-color: #f5d76e; }
  .log-entry.seasonal { border-color: #4dcc7a; }
  .log-entry.birthday { border-color: #e8a0bf; }
  .log-entry.event { border-color: #c8a0d4; }
  .log-entry.random { border-color: #7ecccc; }
  .log-entry.runaway { border-color: #f07070; }
  .log-entry.sick { border-color: #f5a050; }

  .log-date {
    font-size: 9px;
    color: #9988aa;
    margin-bottom: 2px;
  }
  .log-text {
    font-size: 11px;
    color: #d8d0e0;
    line-height: 1.4;
  }
  .log-gold {
    font-size: 10px;
    margin-top: 2px;
  }
  .log-gold.positive { color: #6ee09a; }
  .log-gold.negative { color: #f08098; }

  .empty-msg {
    text-align: center;
    color: #665577;
    font-size: 11px;
    padding: 20px;
    font-style: italic;
  }
</style>

<div class="log-panel">
  <div class="log-title">📜 이벤트 로그</div>
  <div class="log-entries" id="logList"></div>
</div>
<script type="application/json" id="logData">{{json (lookup this "event-log")}}</script>

<script>
  let eventLog = {};
  try { eventLog = JSON.parse(shadow.querySelector('#logData').textContent) || {}; } catch {}
  const entries = eventLog.log || [];
  const container = shadow.querySelector('#logList');

  if (entries.length === 0) {
    container.innerHTML = '<div class="empty-msg">아직 기록이 없습니다</div>';
    return;
  }

  for (const entry of entries) {
    const el = document.createElement('div');
    el.className = 'log-entry ' + (entry.type || 'event');

    let goldHtml = '';
    if (entry.gold_change && entry.gold_change !== 0) {
      const cls = entry.gold_change >= 0 ? 'positive' : 'negative';
      const sign = entry.gold_change >= 0 ? '+' : '';
      goldHtml = `<div class="log-gold ${cls}">${sign}${entry.gold_change}G</div>`;
    }

    el.innerHTML = `
      <div class="log-date">${entry.month || ''}</div>
      <div class="log-text">${entry.text || ''}</div>
      ${goldHtml}
    `;
    container.appendChild(el);
  }
</script>
