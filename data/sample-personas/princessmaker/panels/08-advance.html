  };

  const STAT_NM = {stamina:'체력',intelligence:'지력',elegance:'기품',charm:'매력',morals:'도덕',
    sensitivity:'감수성',faith:'신앙',combat:'무술',etiquette:'예절',cooking:'요리',art:'예술',
    music:'음악',stress:'스트레스',reputation:'명성'};

  function buildPanel() {
    const d = __panelBridge.data;
    const config = d['schedule-config'] || {};
    const acts = config.activities || {};
    const gstate = d['game-state'] || {};
    const custom = gstate.custom_activities || {};
    const all = { ...acts, ...custom };
    const cur = d.current_slot || 0;
    const phase = d.turn_phase || 'setup';

    // Close dock if not in executing phase or all slots done
    if (phase !== 'executing' || cur >= 3) {
      __panelBridge.closeModal('advance');
      el.style.display = 'none';
      return;
    }

    el.style.display = '';
    const nextSlot = cur + 1;
    const nextAid = d['schedule_' + nextSlot] || 'none';
    const nextAct = all[nextAid];

  // Build button row
  let h = '<div class="adv-row">';
  h += '<div class="adv-status"><div class="adv-dots">';
  for (let i = 1; i <= 3; i++) {
    const cls = i <= cur ? 'done' : i === nextSlot ? 'now' : '';
    h += `<div class="adv-dot ${cls}"></div>`;
  }
  h += '</div>';
  h += `<span class="adv-label"><strong>${nextAct ? nextAct.name : '—'}</strong> · ${LBL[nextSlot]}</span>`;
  h += '</div>';
  h += `<button class="adv-edit" id="editBtn">✏️ 수정</button>`;
  h += `<button class="adv-btn" id="advBtn">▶ 스케줄 진행</button>`;
  h += '</div>';
  h += '<div id="simArea"></div>';

  el.innerHTML = h;

    // ═══ Streaming guard: disable button while AI is responding ═══
    const advBtn = shadow.querySelector('#advBtn');
    let _running = false;
    function syncStreaming(streaming) {
      if (_running) return;
      if (advBtn) {
        advBtn.disabled = !!streaming;
        advBtn.textContent = streaming ? '⏳ 응답 대기 중...' : '▶ 스케줄 진행';
      }
    }
    if (window.__bridgeIsStreaming) syncStreaming(true);
    window.addEventListener('__bridge_streaming_change', function(e) { syncStreaming(e.detail); });

    // ═══ Edit button: go back to schedule setup for remaining slots ═══
    shadow.querySelector('#editBtn')?.addEventListener('click', async function() {
    await __panelBridge.updateVariables({ turn_phase: 'setup' });
    await __panelBridge.openModal('schedule', true);
  });

    // Register advance_slot as panel action — all execution logic here
    __panelBridge.registerAction('advance_slot', async (params) => {
      if (_running) return;
      _running = true;
      _animating = true;
      if (advBtn) {
        advBtn.disabled = true;
        advBtn.textContent = '⏳ 진행 중...';
      }

    let res;
    try {
      res = await __panelBridge.runTool('engine', { action: 'advance_slot' });
    } catch(e) {
      _running = false;
      if (advBtn) { advBtn.disabled = false; advBtn.textContent = '▶ 스케줄 진행'; }
      return;
    }
    if (!res.result?.success) {
      _running = false;
      if (advBtn) { advBtn.disabled = false; advBtn.textContent = '▶ 스케줄 진행'; }
      return;
    }
    const r = res.result;

    if (r.steps && r.steps.length > 0) {
      // ═══ DAILY SIM ANIMATION ═══
      const simEl = shadow.querySelector('#simArea');
      const ico = ICO[nextAid] || '📌';
      const days = r.steps;
      const ds = r.daily_summary || {};

      let sh = '<div class="adv-sim">';
      sh += `<div class="adv-sim-hdr"><span class="adv-sim-ico">${ico}</span><span class="adv-sim-name">${r.activity_name}</span></div>`;
      sh += '<div class="adv-days">';
      for (let i = 0; i < days.length; i++) {
        sh += `<div class="adv-day" id="ad${i}"><div class="adv-day-num">${i+1}</div><div class="adv-day-ico">◯</div></div>`;
      }
      sh += '</div>';
      sh += '<div class="adv-bar"><div class="adv-bar-fill" id="adBar"></div></div>';
      sh += '<div class="adv-log" id="adLog"></div>';
      sh += '<div class="adv-result" id="adRes"></div>';
      sh += '</div>';
      if (simEl) simEl.innerHTML = sh;

      const delay = ms => new Promise(resolve => setTimeout(resolve, ms));
      for (let i = 0; i < days.length; i++) {
        await delay(1000);
        const dayEl = shadow.querySelector(`#ad${i}`);
        const barEl = shadow.querySelector('#adBar');
        const logEl = shadow.querySelector('#adLog');
        if (dayEl) {
          dayEl.classList.add('revealed', days[i].success ? 'ok' : 'fail');
          dayEl.querySelector('.adv-day-ico').textContent = days[i].success ? '✓' : '✗';
        }
        if (barEl) barEl.style.width = `${((i+1)/days.length)*100}%`;

        // Build day log line
        if (logEl) {
          const cv = days[i].cumulative_vars || {};
          const pv = i > 0 ? (days[i-1].cumulative_vars || {}) : null;
          const mark = days[i].success
            ? '<span class="ok-mark">✓</span>'
            : '<span class="fail-mark">✗</span>';
          let parts = [];
          for (const [stat, val] of Object.entries(cv)) {
            if (stat === 'gold') continue;
            const prev = pv ? (pv[stat] || 0) : (d[stat] || 0);
            const delta = val - prev;
            if (Math.abs(delta) >= 0.5) {
              const rd = Math.round(delta);
              const nm = STAT_NM[stat] || stat;
              if (stat === 'stress') {
                parts.push(rd > 0 ? `<span class="stat-dn">${nm}+${rd}</span>` : `<span class="stat-up">${nm}${rd}</span>`);
              } else {
                parts.push(rd > 0 ? `<span class="stat-up">${nm}+${rd}</span>` : `<span class="stat-dn">${nm}${rd}</span>`);
              }
            }
          }
          const goldNow = cv.gold || 0;
          const goldPrev = pv ? (pv.gold || 0) : (d.gold || 0);
          const goldDelta = Math.round(goldNow - goldPrev);
          if (goldDelta > 0) parts.push(`<span class="gold-up">+${goldDelta}G</span>`);

          const line = document.createElement('div');
          line.className = 'adv-log-line';
          line.innerHTML = `<span class="day-num">${i+1}일차</span> ${mark} ${parts.join(' ')}`;
          logEl.appendChild(line);
          logEl.scrollTop = logEl.scrollHeight;
        }
      }

      await delay(400);
      const resEl = shadow.querySelector('#adRes');
      if (resEl) {
        const sc = ds.success_count || 0, wd = ds.working_days || days.length, pf = ds.perfect_run;
        let rh = '';
        if (pf) rh += `<span class="adv-result-score"><span class="pf">★ 퍼펙트!</span> ${sc}/${wd}</span>`;
        else if (sc >= wd*0.7) rh += `<span class="adv-result-score"><span class="hi">${sc}/${wd}</span> 성공</span>`;
        else rh += `<span class="adv-result-score"><span class="lo">${sc}/${wd}</span> 성공</span>`;

        const changes = Object.entries(r.stat_changes||{}).filter(([k])=>!k.startsWith('_'));
        let detail = '';
        for (const [k,v] of changes) {
          const cls = v>=0 ? (k==='stress'?'loss':'gain') : (k==='stress'?'gain':'loss');
          detail += `<span class="${cls}">${STAT_NM[k]||k}${v>=0?'+':''}${v}</span> `;
        }
        if (r.pay_earned) detail += `<span class="gain">+${r.pay_earned}G</span>`;
        if (detail) rh += `<span class="adv-result-detail">${detail}</span>`;

        resEl.className = 'adv-result show ' + (pf ? 'perfect' : 'normal');
        resEl.innerHTML = rh;
      }

      await delay(1200);
      await finalize(r);

    } else {
      // ═══ NON-DAILY SIM RESULT DISPLAY ═══
      const simEl = shadow.querySelector('#simArea');
      const ico = ICO[nextAid] || '📌';
      const delay = ms => new Promise(resolve => setTimeout(resolve, ms));
      let sh = '<div class="adv-battle">';
      sh += `<div class="adv-battle-hdr"><span class="adv-battle-ico">${ico}</span><span class="adv-battle-name">${r.activity_name}</span></div>`;
      sh += '<div id="advGauges"></div>';
      sh += '<div id="advBattles"></div>';
      sh += '<div class="adv-summary" id="advSummary"></div>';
      sh += '</div>';
      if (simEl) simEl.innerHTML = sh;

      const adv = r.adventure_result;
      const bContainer = shadow.querySelector('#advBattles');
      const gaugeContainer = shadow.querySelector('#advGauges');
      const playerMaxHp = d.hp_max || 40;

      // ── Enhanced stat gauge animation (non-adventure non-daily) ──
      const hasAdventure = adv && adv.battles && adv.battles.length > 0;
      if (!hasAdventure && gaugeContainer) {
        const changes = Object.entries(r.stat_changes||{}).filter(([k])=>!k.startsWith('_'));
        const STAT_MAX = { stress: d.stress_max || 100, hp: d.hp_max || 40 };
        const DEFAULT_VIS_MAX = 300;

        // Determine result tag
        const hasCrit = (r.events||[]).some(e => e.type === 'critical_success');
        const hasFail = (r.events||[]).some(e => e.type === 'failure');
        const isRest = nextAid === 'rest' || nextAid === 'free_time';
        const tagClass = hasCrit ? 'critical' : isRest ? 'rest' : 'normal';
        const tagText = hasCrit ? '🌟 대성공!' : hasFail ? '💫 실패' : isRest ? '회복' : '완료';

        // Build result card
        const card = document.createElement('div');
        card.className = 'adv-rc';
        card.innerHTML = `
          <div class="adv-rc-hdr">
            <span class="adv-rc-ico">${ico}</span>
            <span class="adv-rc-title">${r.activity_name}</span>
            <span class="adv-rc-tag ${tagClass}">${tagText}</span>
          </div>
          <div id="rcGauges"></div>
          <div id="rcGold"></div>
          <div id="rcEvents"></div>
        `;
        gaugeContainer.appendChild(card);
        await delay(200);
        card.classList.add('show');

        const gaugesEl = shadow.querySelector('#rcGauges');

        if (changes.length > 0 && gaugesEl) {
          for (const [stat, delta] of changes) {
            const oldVal = d[stat] || 0;
            const newVal = oldVal + delta;
            const visMax = STAT_MAX[stat] || Math.max(DEFAULT_VIS_MAX, Math.max(oldVal, newVal) + 50);
            const isStress = stat === 'stress';
            const isHp = stat === 'hp';
            const isPositive = isStress ? delta < 0 : delta > 0;

            let fillClass;
            if (isStress) fillClass = delta < 0 ? 'stress-dec' : 'stress-inc';
            else if (isHp) fillClass = 'hp-fill';
            else fillClass = delta > 0 ? 'increase' : 'decrease';

            const oldPct = Math.max(0, Math.min(100, (oldVal / visMax) * 100));
            const newPct = Math.max(0, Math.min(100, (newVal / visMax) * 100));
            const ghostPct = delta > 0 ? oldPct : newPct;
            const ghostW = Math.max(oldPct, newPct);
            const ghostClass = delta > 0 ? 'was-lower' : 'was-higher';

            const name = STAT_NM[stat] || stat;
            const maxLabel = STAT_MAX[stat] ? `/${STAT_MAX[stat]}` : '';
            const deltaSign = delta > 0 ? '+' : '';
            const deltaClass = isPositive ? 'pos' : 'neg';

            const row = document.createElement('div');
            row.className = 'adv-gr';
            row.innerHTML = `
              <div class="adv-gr-top">
                <span class="adv-gr-name">${name}</span>
                <span class="adv-gr-vals">
                  <span class="adv-gr-old">${oldVal}${maxLabel}</span>
                  <span class="adv-gr-arrow">→</span>
                  <span class="adv-gr-new" id="grn_${stat}">${oldVal}${maxLabel}</span>
                  <span class="adv-gr-badge ${deltaClass}" id="grb_${stat}">${deltaSign}${delta}</span>
                </span>
              </div>
              <div class="adv-gr-bar">
                <div class="adv-gr-ghost ${ghostClass}" style="width:${ghostW}%"></div>
                <div class="adv-gr-fill ${fillClass}" id="grf_${stat}" style="width:${oldPct}%"></div>
              </div>
            `;
            gaugesEl.appendChild(row);

            // Staggered reveal per gauge
            await delay(350);
            row.classList.add('show');

            // Trigger bar transition
            await delay(120);
            const fillEl = shadow.querySelector(`#grf_${stat}`);
            if (fillEl) fillEl.style.width = newPct + '%';

            // Animate number counter (old → new)
            const valEl = shadow.querySelector(`#grn_${stat}`);
            if (valEl) {
              const steps = 24;
              const stepTime = 45;
              for (let s = 1; s <= steps; s++) {
                await delay(stepTime);
                const cur = Math.round(oldVal + (newVal - oldVal) * (s / steps));
                valEl.textContent = cur + maxLabel;
              }
            }

            // Pop delta badge with spring
            const badgeEl = shadow.querySelector(`#grb_${stat}`);
            if (badgeEl) badgeEl.classList.add('show');

            // Bar glow pulse
            if (fillEl) {
              fillEl.classList.add('glow');
              setTimeout(() => fillEl.classList.remove('glow'), 1200);
            }

            // Fade ghost
            const ghostEl = row.querySelector('.adv-gr-ghost');
            if (ghostEl) ghostEl.classList.add('fade');
          }
        }

        // Gold change row
        const goldDelta = (r.gold_change || 0) - (r.cost_paid || 0);
        if (goldDelta !== 0) {
          await delay(300);
          const goldContainer = shadow.querySelector('#rcGold');
          if (goldContainer) {
            const goldRow = document.createElement('div');
            goldRow.className = 'adv-rc-gold';
            goldRow.innerHTML = `<span class="adv-rc-gold-ico">💰</span><span class="adv-rc-gold-text">${goldDelta > 0 ? '+' : ''}${goldDelta}G</span>`;
            goldContainer.appendChild(goldRow);
            await delay(50);
            goldRow.classList.add('show');
          }
        }

        // Events
        const evts = (r.events || []).filter(e => e.type !== 'wish_bonus' && e.type !== 'wish_penalty');
        if (evts.length) {
          await delay(350);
          const evtContainer = shadow.querySelector('#rcEvents');
          if (evtContainer) {
            const evtDiv = document.createElement('div');
            evtDiv.className = 'adv-rc-events';
            evtContainer.appendChild(evtDiv);
            for (const e of evts) {
              const eIco = {critical_success:'🌟',failure:'💫',exam:'📝',sparring:'⚔️',
                tip:'💰',inspiration:'✨',encounter:'👤',dark_encounter:'🌑'}[e.type] || '📌';
              const line = document.createElement('div');
              line.className = 'adv-rc-evt';
              line.innerHTML = `<span class="adv-rc-evt-ico">${eIco}</span><span>${e.message}</span>`;
              evtDiv.appendChild(line);
              await delay(200);
              line.classList.add('show');
            }
          }
        }
      }

      // ── Adventure: animated round-by-round battle ──
      if (hasAdventure) {
        let runningPlayerHp = d.hp || playerMaxHp;

        for (let bi = 0; bi < adv.battles.length; bi++) {
          const b = adv.battles[bi];
          const log = b.round_log || [];
          const eMaxHp = b.enemy_max_hp || 30;
          await delay(800);

          // Create encounter container
          const enc = document.createElement('div');
          enc.className = 'adv-encounter';
          let eh = `<div class="adv-enc-hdr"><span class="adv-enc-enemy">⚔ ${b.enemy}</span><span class="adv-enc-badge" id="badge${bi}">전투 중</span></div>`;
          eh += `<div class="adv-hp-row"><span class="adv-hp-label">올리브</span><div class="adv-hp-bar"><div class="adv-hp-fill player" id="php${bi}" style="width:${(runningPlayerHp/playerMaxHp)*100}%"></div></div><span class="adv-hp-val" id="phv${bi}">${runningPlayerHp}/${playerMaxHp}</span></div>`;
          eh += `<div class="adv-hp-row"><span class="adv-hp-label">${b.enemy}</span><div class="adv-hp-bar"><div class="adv-hp-fill enemy" id="ehp${bi}" style="width:100%"></div></div><span class="adv-hp-val" id="ehv${bi}">${eMaxHp}/${eMaxHp}</span></div>`;
          eh += `<div class="adv-rounds" id="rnds${bi}"></div>`;
          enc.innerHTML = eh;
          if (bContainer) bContainer.appendChild(enc);

          // Animate each round
          const rndsEl = shadow.querySelector(`#rnds${bi}`);
          let curEHp = eMaxHp;

          const eName = b.enemy;
          // Korean postposition helper (받침 여부에 따라 조사 선택)
          function pp(name, withFinal, withoutFinal) {
            const last = name.charCodeAt(name.length - 1);
            if (last >= 0xAC00 && last <= 0xD7A3) {
              return name + ((last - 0xAC00) % 28 > 0 ? withFinal : withoutFinal);
            }
            return name + withFinal; // fallback: assume 받침 있음
          }

          for (let ri = 0; ri < log.length; ri++) {
            const rd = log[ri];
            await delay(500);

            // Player attack line (text RPG style)
            let atkLine = '';
            if (rd.crit) {
              atkLine = `<div class="adv-rnd-line"><span class="crit">💥 올리브의 크리티컬!</span> ${rd.magic?'<span class="magic">✦마법</span> ':''}${eName}에게 <span class="crit">${rd.player_dmg}</span> 데미지</div>`;
            } else {
              atkLine = `<div class="adv-rnd-line"><span class="atk">올리브</span>가 ${pp(eName,'을','를')} 공격! ${rd.magic?'<span class="magic">✦마법</span> ':''}<span class="dmg">(${rd.player_dmg} 데미지)</span></div>`;
            }

            // Enemy HP update
            curEHp = rd.enemy_hp;
            const eHpBar = shadow.querySelector(`#ehp${bi}`);
            const eHpVal = shadow.querySelector(`#ehv${bi}`);
            if (eHpBar) eHpBar.style.width = `${Math.max(0, (curEHp / eMaxHp) * 100)}%`;
            if (eHpVal) eHpVal.textContent = `${Math.max(0, curEHp)}/${eMaxHp}`;

            // Kill line
            let killLine = '';
            if (curEHp <= 0) killLine = `<div class="adv-rnd-line"><span class="kill">⚔ ${eName} 처치!</span></div>`;

            // Enemy attack line
            let defLine = '';
            if (curEHp > 0) {
              if (rd.dodged) {
                defLine = `<div class="adv-rnd-line">${pp(eName,'이','가')} 올리브를 공격! <span class="dodge">회피 성공!</span></div>`;
              } else if (rd.enemy_dmg > 0) {
                defLine = `<div class="adv-rnd-line"><span class="dmg-in">${pp(eName,'이','가')}</span> 올리브를 공격! <span class="dmg-in">(${rd.enemy_dmg} 데미지)</span></div>`;
                // Player HP update
                runningPlayerHp = rd.player_hp;
                const pHpBar = shadow.querySelector(`#php${bi}`);
                const pHpVal = shadow.querySelector(`#phv${bi}`);
                if (pHpBar) pHpBar.style.width = `${Math.max(0, (runningPlayerHp / playerMaxHp) * 100)}%`;
                if (pHpVal) pHpVal.textContent = `${Math.max(0, runningPlayerHp)}/${playerMaxHp}`;
              }
            }

            const rndEl = document.createElement('div');
            rndEl.className = 'adv-rnd';
            rndEl.innerHTML = `<div class="adv-rnd-hdr">── R${rd.round} ──</div>${atkLine}${killLine}${defLine}`;
            if (rndsEl) { rndsEl.appendChild(rndEl); rndsEl.scrollTop = rndsEl.scrollHeight; }
          }

          // Show result badge
          await delay(600);
          const badge = shadow.querySelector(`#badge${bi}`);
          if (badge) {
            badge.className = 'adv-enc-badge ' + (b.won ? 'win' : 'lose');
            badge.textContent = b.won ? '승리' : '패배';
          }

          // Show rewards
          if (b.won && b.rewards) {
            const parts = [];
            if (b.rewards.gold) parts.push('+' + b.rewards.gold + 'G');
            if (b.rewards.exp_combat) parts.push('무술+' + b.rewards.exp_combat);
            if (parts.length) {
              const rwEl = document.createElement('div');
              rwEl.className = 'adv-enc-reward';
              rwEl.textContent = parts.join('  ');
              enc.appendChild(rwEl);
            }
          }

          // If player died, update HP bar to 0
          if (runningPlayerHp <= 0) {
            const pHpBar = shadow.querySelector(`#php${bi}`);
            const pHpVal = shadow.querySelector(`#phv${bi}`);
            if (pHpBar) pHpBar.style.width = '0%';
            if (pHpVal) pHpVal.textContent = `0/${playerMaxHp}`;
          }

          await delay(400);
        }

        // Treasures
        if (adv.treasures && adv.treasures.length) {
          await delay(600);
          const tEntry = document.createElement('div');
          tEntry.className = 'adv-battle-entry win';
          tEntry.innerHTML = `<span class="adv-battle-enemy">🎁 보물</span><span class="adv-battle-reward">${adv.treasures.join(', ')}</span>`;
          if (bContainer) bContainer.appendChild(tEntry);
        }
      }

      // ── Stat summary (adventure only — gauges handle non-adventure) ──
      if (hasAdventure) {
        await delay(800);
        const sumEl = shadow.querySelector('#advSummary');
        if (sumEl) {
          let parts = [];
          const changes = Object.entries(r.stat_changes||{}).filter(([k])=>!k.startsWith('_'));
          for (const [k,v] of changes) {
            const cls = v>=0 ? (k==='stress'?'dn':'up') : (k==='stress'?'up':'dn');
            parts.push(`<span class="adv-summary-item"><span class="${cls}">${STAT_NM[k]||k}${v>=0?'+':''}${v}</span></span>`);
          }
          if (r.gold_change) {
            const cls = r.gold_change >= 0 ? 'gd' : 'dn';
            parts.push(`<span class="adv-summary-item"><span class="${cls}">${r.gold_change>=0?'+':''}${r.gold_change}G</span></span>`);
          }
          if (r.cost_paid) parts.push(`<span class="adv-summary-item"><span class="dn">비용 -${r.cost_paid}G</span></span>`);
          if (adv && adv.hp_remaining !== undefined) {
            parts.push(`<span class="adv-summary-item">HP <span class="${adv.hp_remaining<=0?'dn':'up'}">${adv.hp_remaining}/${playerMaxHp}</span></span>`);
          }
          if (parts.length === 0) parts.push(`<span class="adv-summary-item">변화 없음</span>`);
          sumEl.innerHTML = parts.join('');
        }
      }

      await delay(hasAdventure ? 1500 : 800);
      await finalize(r);
    }
  });

    // Button click delegates to panel action
    advBtn?.addEventListener('click', async function() {
      if (this.disabled) return;
      await __panelBridge.executeAction('advance_slot');
    });

  } // end buildPanel

  async function finalize(r) {
    _animating = false;

    // Phase 1: 활동 결과만 → AI 서사
    await __panelBridge.queueEvent(buildSlotSummary(r));
    __panelBridge.sendMessage('[스케줄 진행]');

    // Re-open advance dock for next slot (sendMessage auto-closes panels)
    // pending_transition이면 복원 불필요 (곧 setup으로 갈 예정)
    if (!r.pending_transition && !r.adventure_started) {
      setTimeout(() => {
        __panelBridge.openModal('advance', true);
      }, 500);
    }

    // 활동 팝업은 AI 응답 후에 (기존 패턴 유지)
    if (r.popups && r.popups.length > 0) {
      setupPopupHook(r.popups);
    }

    // 모험 모달도 AI 응답 후에 (기존 패턴 유지)
    if (r.adventure_started) {
      setupAdventureHook();
    }

    // Phase 2: 월 전환 (활동 AI 응답 완료 후)
    if (r.pending_transition) {
      setupTransitionHook();
    }
  }

  function setupPopupHook(popups) {
    const pendingPopups = [...popups]; // capture popup data
    if (window.__popupTurnEndUnsub) {
      window.__popupTurnEndUnsub();
      window.__popupTurnEndUnsub = null;
    }
    window.__popupTurnEndUnsub = __panelBridge.on('turnEnd', async () => {
      if (window.__popupTurnEndUnsub) {
        window.__popupTurnEndUnsub();
        window.__popupTurnEndUnsub = null;
      }
      // Batch set all popups at once to avoid PopupEffect resetting on each addition
      window.__popupsPlaying = true;
      await __panelBridge.updateVariables({ __popups: pendingPopups });
    });
  }

  function setupAdventureHook() {
    // Clean up any orphaned listener from previous render
    if (window.__advTurnEndUnsub) {
      window.__advTurnEndUnsub();
      window.__advTurnEndUnsub = null;
    }
    window.__advTurnEndUnsub = __panelBridge.on('turnEnd', () => {
      // One-shot: clean up immediately
      if (window.__advTurnEndUnsub) {
        window.__advTurnEndUnsub();
        window.__advTurnEndUnsub = null;
      }
      // Only open if adventure data actually exists and is pending
      const adv = __panelBridge.data?.__adventure;
      if (adv && adv.active && adv.status === 'encounter') {
        __panelBridge.openModal('adventure', true);
      }
    });
  }

  function setupTransitionHook() {
    if (window.__transitionTurnEndUnsub) {
      window.__transitionTurnEndUnsub();
      window.__transitionTurnEndUnsub = null;
    }

    window.__transitionTurnEndUnsub = __panelBridge.on('turnEnd', async () => {
      // 원샷 해제
      if (window.__transitionTurnEndUnsub) {
        window.__transitionTurnEndUnsub();
        window.__transitionTurnEndUnsub = null;
      }

      // 엔진 turn_transition 호출 — 프론트에 처리 중 표시
      await __panelBridge.updateVariables({
        __popups: [{ type: 'info', title: '월말 정산', message: '다음 달을 준비하고 있습니다...', icon: '📅' }]
      });

      let tr;
      try {
        tr = await __panelBridge.runTool('engine', { action: 'turn_transition' });
      } catch (e) { return; }
      if (!tr.result?.success) return;

      const result = tr.result;

      // 월 전환 팝업 표시 (생일, 계절, 해금 — AI 응답 사이에 보여줌)
      if (result.popups && result.popups.length > 0) {
        await __panelBridge.updateVariables({ __popups: result.popups });
      }

      // needs_narration이면 AI에게 월말 서사 요청 (visible message로 프론트에 표시)
      if (result.needs_narration && result.month_summary) {
        const header = buildMonthSummary(result.month_summary);
        // 팝업 재생 시간을 고려한 딜레이 후 visible 메시지 발송
        const popupDelay = (result.popups?.length || 0) * 4500 + 500;
        setTimeout(async () => {
          await __panelBridge.queueEvent(header);
          __panelBridge.sendMessage('[월말 정산]');
        }, popupDelay);
      }
      // needs_narration이 아니면 조용히 다음 달 준비 완료
      // (turn_transition이 이미 variables를 setup 위상으로 변경)
    });
  }

  // ═══ STATE SNAPSHOT (shared helper) ═══
  function buildStateSnapshot(eventContext) {
    const d = __panelBridge.data;
    const hints = d['hint-rules'] || {};
    function getHint(stat, val) {
      const rule = hints[stat];
      if (!rule?.tiers) return '';
      if (rule.tier_mode === 'percentage' && rule.max_key) {
        const pct = (val / (d[rule.max_key] || 999)) * 100;
        return (rule.tiers.find(t => pct <= t.max) || {}).hint || '';
      }
      return (rule.tiers.find(t => val <= t.max) || {}).hint || '';
    }
    const l = ['\n[STATE_SNAPSHOT]'];
    const stats = ['stamina','intelligence','elegance','charm','morals','sensitivity',
                   'faith','combat','etiquette','cooking','art','music'];
    const statLine = stats.map(s => `${STAT_NM[s]}:${d[s]||0}`).join(' ');
    l.push(statLine);
    const stressH = getHint('stress', d.stress||0);
    const goldH = getHint('gold', d.gold||0);
    l.push(`스트레스:${d.stress||0}/${d.stress_max||100}${stressH?'('+stressH+')':''} 골드:${d.gold||0}G${goldH?'('+goldH+')':''} HP:${d.hp||0}/${d.hp_max||30} 명성:${d.reputation||0}`);
    l.push(`기분:${d.mood||'보통'} 나이:${d.age||10}세 계절:${d.season||''}`);
    if (d.wish_text) l.push(`소원: ${d.wish_text}`);
    // Dominant stat hint
    let topStat = '', topVal = 0;
    for (const s of stats) {
      if (s === 'stamina') continue;
      if ((d[s]||0) > topVal) { topVal = d[s]||0; topStat = s; }
    }
    if (topStat) { const h = getHint(topStat, topVal); if (h) l.push(`성향: ${STAT_NM[topStat]} — ${h}`); }
    const gs = d['game-state'] || {};
    if (gs.dark_path) {
      l.push('🌑 어둠의 길: 활성화');
      // Contextual dark path reminder for high-impact events
      if (eventContext) {
        const darkTriggers = new Set(['failure','dark_encounter','dark_random']);
        const hasDarkEvent = (eventContext.events||[]).some(e => darkTriggers.has(e.type));
        const hasDefeat = eventContext.adventure_started;
        if (hasDarkEvent || hasDefeat) {
          l.push('[DARK_PATH_REMINDER] 어둠의 길 활성화중. 이번 결과의 서사 수위와 묘사를 다크패스에 맞게 반영하라. CLAUDE.md의 "다크패스 서사" 섹션 참조.');
        }
      }
    }
    return l;
  }

  function buildSlotSummary(r) {
    const d = __panelBridge.data;
    let l = [`[SLOT_RESULT] ${d.current_year}년차 ${d.current_month}월 ${r.slot_label}`];
    l.push(`활동: ${r.activity_name} (${r.activity_category})`);
    if (r.activity_context) {
      const ctx = r.activity_context;
      const countStr = `통산 ${ctx.total_count}회째`;
      const lastStr = ctx.last_period ? `이전: ${ctx.last_period}` : '첫 도전';
      l.push(`📊 ${countStr} | ${lastStr}`);
    }
    if (r.daily_summary) {
      l.push(`일일 시뮬레이션: ${r.daily_summary.success_count}/${r.daily_summary.working_days}일 성공`);
      if (r.daily_summary.perfect_run) l.push('🌟 퍼펙트 런! 모든 날을 완벽하게 보냈다!');
    }
    const ch = Object.entries(r.stat_changes||{}).filter(([k])=>!k.startsWith('_')).map(([k,v])=>`${STAT_NM[k]||k}${v>=0?'+':''}${v}`).join(', ');
    if (ch) l.push(`스탯 변화: ${ch}`);
    if (r.cost_paid) l.push(`비용: -${r.cost_paid}G`);
    if (r.pay_earned) l.push(`수입: +${r.pay_earned}G`);
    for (const e of (r.events||[])) {
      const p = {critical_success:'🌟',failure:'💫',exam:'📝',sparring:'⚔️',tip:'💰',inspiration:'✨',encounter:'👤',dark_encounter:'🌑',
                 perfect_run:'🌟',wish_bonus:'📌',wish_penalty:'📌'}[e.type]||'📌';
      l.push(`${p} ${e.message}`);
    }
    if (r.adventure_result) {
      l.push(`\n[ADVENTURE] ${r.adventure_result.zone}`);
      for (const b of r.adventure_result.battles)
        l.push(`- ${b.enemy}: ${b.won?'승리':'패배'} (${b.rounds}R, 피해${b.damage_taken}${b.rewards?.gold?', +'+b.rewards.gold+'G':''})`);
      if (r.adventure_result.treasures.length) l.push(`보물: ${r.adventure_result.treasures.join(', ')}`);
      l.push(`HP 잔여: ${r.adventure_result.hp_remaining}`);
    }
    if (r.adventure_started) {
      l.push(`\n[ADVENTURE_STARTED] 모험 패널에서 전투를 진행하세요.`);
    }
    if (r.values_trigger) {
      l.push(`\n[VALUES_TRIGGER] reason=${r.values_trigger.reason} topic=${r.values_trigger.topic}`);
      l.push(`context: ${r.values_trigger.context}`);
      if (r.values_trigger.stat) l.push(`stat: ${r.values_trigger.stat} milestone: ${r.values_trigger.milestone}`);
      l.push(`→ __values_prompt를 설정한 뒤, 서사 마지막에 $PANEL:values-trigger$ 토큰을 삽입하라. 유저가 버튼을 눌러야 모달이 열린다.`);
    }
    l.push(...buildStateSnapshot(r));
    return l.join('\n');
  }

  function buildMonthSummary(ms) {
    const d = __panelBridge.data;
    let l = [`[MONTH_END] → ${ms.year}년차 ${ms.month}월 (${ms.season}), ${d.name} ${ms.age}세`];
    if (ms.stress_event) l.push(`⚠ ${ms.stress_event.message}`);
    for (const e of (ms.events||[]))
      l.push(`${e.type==='unlock'?'🔓':e.type==='seasonal'?'🎉':e.type==='birthday'?'🎂':'📌'} ${e.message}`);
    if (ms.competitions_available?.length)
      l.push(`🏆 참가 가능 대회: ${ms.competitions_available.map(c=>c.name).join(', ')}`);
    if (ms.next_wish) l.push(`💭 다음 달 소원: ${ms.next_wish.text}`);
    if (ms.ending_notice) l.push(`🏆 ${ms.ending_notice}`);
    if (ms.portrait_update) {
      const pu = ms.portrait_update;
      l.push(`\n[PORTRAIT_UPDATE] ${pu.reason === 'stance_change' ? `스탠스 변경: ${pu.old_stance} → ${pu.new_stance}` : `나이 변경: ${pu.age}세`}`);
      l.push(`→ standing_portrait.png를 재생성하고 portrait_needs_update를 false로 설정하라. 워크플로: profile, 파일명: standing_portrait.png`);
    }
    l.push(...buildStateSnapshot(null));
    return l.join('\n');
  }

  // ═══ Initial render ═══
  buildPanel();

  // ═══ Re-render on AI turn end (since autoRefresh is disabled) ═══
  __panelBridge.on('turnEnd', () => {
    if (_animating) return;  // Don't interrupt running animation
    setTimeout(() => buildPanel(), 300);  // Small delay to ensure data is fresh
  });
</script>
