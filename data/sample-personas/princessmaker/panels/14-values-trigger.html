<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@500;700&display=swap');
  :host { font-family: 'Noto Sans KR', sans-serif; }

  .vt { display: none; }
  .vt.show { display: inline-block; }

  .vt-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    background: rgba(232,160,191,0.06);
    border: 1px solid rgba(232,160,191,0.18);
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.15s ease-out;
    font-family: inherit;
    font-size: 12px;
    font-weight: 600;
    color: #e8a0bf;
    line-height: 1;
  }
  .vt-btn:hover {
    border-color: rgba(232,160,191,0.4);
    background: rgba(232,160,191,0.1);
    box-shadow: 0 2px 8px rgba(232,160,191,0.08);
  }
  .vt-btn:active {
    transform: scale(0.98);
    transition-duration: 0.06s;
  }
  .vt-arrow {
    font-size: 11px;
    color: rgba(232,160,191,0.4);
    transition: transform 0.15s;
  }
  .vt-btn:hover .vt-arrow {
    transform: translateX(2px);
    color: rgba(232,160,191,0.7);
  }
</style>

<!-- {{__values_prompt.question}} -->
<div class="vt" id="vtRoot">
  <button class="vt-btn" id="vtBtn">💭 가치관 선택 <span class="vt-arrow">›</span></button>
</div>

<script>
  const d = __panelBridge.data;
  const vp = d.__values_prompt;
  const el = shadow.querySelector('#vtRoot');

  if (!vp || !vp.choices || !vp.choices.length) return;

  el.classList.add('show');

  const btn = shadow.querySelector('#vtBtn');
  btn?.addEventListener('click', () => {
    __panelBridge.openModal('values', 'dismissible');
  });

  window.addEventListener('values-chosen', () => {
    btn.disabled = true;
    btn.style.opacity = '0.4';
    btn.style.cursor = 'default';
  });
</script>
