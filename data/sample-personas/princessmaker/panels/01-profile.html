<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');
  :host { font-family: 'Noto Sans KR', sans-serif; }

  .profile-card {
    background: linear-gradient(135deg, #2a1f3d 0%, #1e1630 100%);
    border-radius: 12px;
    padding: 14px;
    position: relative;
    overflow: hidden;
  }
  .profile-card::before {
    content: '';
    position: absolute;
    top: -30px; right: -30px;
    width: 80px; height: 80px;
    background: radial-gradient(circle, rgba(232,160,191,0.15) 0%, transparent 70%);
    border-radius: 50%;
  }

  .header-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
  }
  .name-area { flex: 1; }
  .char-name {
    font-size: 16px;
    font-weight: 700;
    color: #f0e8f5;
    letter-spacing: 0.5px;
  }
  .char-age {
    font-size: 11px;
    color: #c8a0d4;
    margin-top: 2px;
  }

  .date-badge {
    background: rgba(232,160,191,0.12);
    border: 1px solid rgba(232,160,191,0.25);
    border-radius: 8px;
    padding: 4px 10px;
    font-size: 11px;
    color: #e8a0bf;
    text-align: center;
    line-height: 1.5;
  }
  .date-badge .year { font-weight: 700; font-size: 12px; }
  .date-badge .season { font-size: 10px; color: #c8a0d4; }

  .divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(232,160,191,0.3), transparent);
    margin: 10px 0;
  }

  .info-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .info-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
  }
  .info-icon {
    width: 22px; height: 22px;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
    flex-shrink: 0;
  }
  .info-icon.gold { background: rgba(255,215,100,0.15); }
  .info-icon.mood { background: rgba(160,220,160,0.15); }
  .info-icon.loc { background: rgba(100,180,255,0.15); }
  .info-icon.outfit { background: rgba(200,160,230,0.15); }
  .info-label { color: #9988aa; font-size: 10px; }
  .info-value { color: #f0e8f5; font-weight: 500; }

  .bars-section { margin-top: 10px; }
  .bar-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
  }
  .bar-label {
    width: 26px;
    font-size: 10px;
    color: #9988aa;
    text-align: center;
    flex-shrink: 0;
  }
  .bar-track {
    flex: 1;
    height: 10px;
    background: rgba(255,255,255,0.06);
    border-radius: 5px;
    overflow: hidden;
    position: relative;
  }
  .bar-fill {
    height: 100%;
    border-radius: 5px;
    transition: width 0.4s ease;
    position: relative;
  }
  .bar-fill::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 50%;
    background: linear-gradient(180deg, rgba(255,255,255,0.2), transparent);
    border-radius: 5px 5px 0 0;
  }
  .bar-fill.hp { background: linear-gradient(90deg, #4dcc7a, #2ecc71); }
  .bar-fill.stress { background: linear-gradient(90deg, #e8a0bf, #e74c6f); }
  .bar-num {
    width: 50px;
    font-size: 10px;
    color: #c8a0d4;
    text-align: right;
    flex-shrink: 0;
  }

  .quick-btns {
    display: flex;
    gap: 4px;
    margin-top: 10px;
  }
  .qbtn {
    flex: 1;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(232,160,191,0.15);
    border-radius: 6px;
    padding: 5px 0;
    font-size: 10px;
    color: #c8a0d4;
    cursor: pointer;
    font-family: inherit;
    text-align: center;
    transition: all 0.2s;
  }
  .qbtn:hover { background: rgba(232,160,191,0.1); border-color: rgba(232,160,191,0.3); color: #e8a0bf; }
  .qbtn.active { background: rgba(232,160,191,0.15); border-color: #e8a0bf; color: #e8a0bf; }
</style>

<div class="profile-card">
  <div class="header-row">
    <div class="name-area">
      <div class="char-name">{{name}}</div>
      <div class="char-age">{{age}}세 · {{mood}}</div>
    </div>
    <div class="date-badge">
      <div class="year">{{current_year}}년차 {{current_month}}월</div>
      <div class="season">{{season}}</div>
    </div>
  </div>

  <div class="divider"></div>

  <div class="info-grid">
    <div class="info-item">
      <div class="info-icon gold">💰</div>
      <div>
        <div class="info-label">소지금</div>
        <div class="info-value">{{formatNumber gold}}G</div>
      </div>
    </div>
    <div class="info-item">
      <div class="info-icon mood">
        {{#if (gte stress 70)}}😰{{else}}{{#if (gte stress 40)}}😐{{else}}😊{{/if}}{{/if}}
      </div>
      <div>
        <div class="info-label">체중</div>
        <div class="info-value">{{weight}}kg</div>
      </div>
    </div>
    <div class="info-item">
      <div class="info-icon loc">📍</div>
      <div>
        <div class="info-label">위치</div>
        <div class="info-value">{{location}}</div>
      </div>
    </div>
    <div class="info-item">
      <div class="info-icon outfit">👗</div>
      <div>
        <div class="info-label">복장</div>
        <div class="info-value">{{outfit}}</div>
      </div>
    </div>
  </div>

  <div class="divider"></div>

  <div class="bars-section">
    <div class="bar-row">
      <div class="bar-label">❤️</div>
      <div class="bar-track">
        <div class="bar-fill hp" style="width:{{percentage hp hp_max}}%"></div>
      </div>
      <div class="bar-num">{{hp}}/{{hp_max}}</div>
    </div>
    <div class="bar-row">
      <div class="bar-label">💢</div>
      <div class="bar-track">
        <div class="bar-fill stress" style="width:{{percentage stress stress_max}}%"></div>
      </div>
      <div class="bar-num">{{stress}}/{{stress_max}}</div>
    </div>
  </div>

  <div class="quick-btns">
    <button class="qbtn" id="toggleSchedule">📅 스케줄</button>
    <button class="qbtn" id="togglePortrait">👧 포트레이트</button>
    <button class="qbtn" id="openCatalog">📖 활동</button>
    <button class="qbtn" id="openInventory">🎒 인벤</button>
  </div>
</div>

<script>
  const currentModals = __panelBridge?.data?.__modals || {};
  if (currentModals.portrait) shadow.querySelector('#togglePortrait')?.classList.add('active');

  shadow.querySelector('#toggleSchedule')?.addEventListener('click', () => __panelBridge.openModal('schedule', 'dismissible'));
  shadow.querySelector('#togglePortrait')?.addEventListener('click', () => {
    const isOpen = (__panelBridge?.data?.__modals || {}).portrait;
    isOpen ? __panelBridge.closeModal('portrait') : __panelBridge.openModal('portrait', 'dismissible');
  });
  shadow.querySelector('#openCatalog')?.addEventListener('click', () => __panelBridge.openModal('catalog', 'dismissible'));
  shadow.querySelector('#openInventory')?.addEventListener('click', () => __panelBridge.openModal('inventory', 'dismissible'));
</script>
