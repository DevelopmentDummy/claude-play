<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');
  :host { font-family: 'Noto Sans KR', sans-serif; }

  .catalog {
    max-width: 520px;
    margin: 0 auto;
  }
  .catalog-title {
    font-size: 15px;
    font-weight: 700;
    color: #e8a0bf;
    text-align: center;
    margin-bottom: 14px;
    letter-spacing: 1px;
  }

  .tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-bottom: 12px;
    justify-content: center;
  }
  .tab-btn {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(232,160,191,0.15);
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 11px;
    color: #9988aa;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
  }
  .tab-btn:hover { background: rgba(232,160,191,0.1); color: #c8a0d4; }
  .tab-btn.active { background: rgba(232,160,191,0.15); border-color: #e8a0bf; color: #e8a0bf; font-weight: 600; }

  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  .activity-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 10px;
    padding: 10px 12px;
    margin-bottom: 8px;
    transition: all 0.2s;
  }
  .activity-card:hover { background: rgba(255,255,255,0.07); }
  .activity-card.locked {
    opacity: 0.5;
    border-color: rgba(255,255,255,0.03);
  }
  .activity-card.locked:hover { opacity: 0.65; }

  .act-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 5px;
  }
  .act-name {
    font-size: 13px;
    font-weight: 600;
    color: #f0e8f5;
  }
  .act-name .lock-icon { color: #9988aa; margin-right: 4px; }
  .act-name .custom-badge {
    font-size: 9px;
    background: rgba(100,200,120,0.15);
    color: #8ce0a0;
    padding: 1px 5px;
    border-radius: 4px;
    margin-left: 5px;
  }
  .act-cost {
    font-size: 11px;
    font-weight: 600;
  }
  .act-cost.gold { color: #f5d76e; }
  .act-cost.income { color: #4dcc7a; }
  .act-cost.free { color: #9988aa; }

  .act-desc {
    font-size: 11px;
    color: #9988aa;
    margin-bottom: 6px;
    line-height: 1.4;
  }

  .act-effects {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }
  .effect-tag {
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 4px;
    font-weight: 500;
  }
  .effect-tag.positive { background: rgba(77,204,122,0.12); color: #6ee09a; }
  .effect-tag.negative { background: rgba(231,76,111,0.12); color: #f08098; }
  .effect-tag.neutral { background: rgba(255,255,255,0.06); color: #c8a0d4; }

  .act-requirements {
    margin-top: 5px;
    font-size: 10px;
    color: #e87da0;
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }
  .req-tag {
    background: rgba(232,125,160,0.1);
    padding: 1px 6px;
    border-radius: 3px;
  }

  .empty-msg {
    text-align: center;
    color: #9988aa;
    font-size: 12px;
    padding: 20px;
  }
</style>

<div class="catalog">
  <div class="catalog-title">📖 활동 카탈로그</div>
  <div class="tabs" id="tabBar"></div>
  <div id="tabContent"></div>
</div>

<script>
  const d = __panelBridge.data;
  const config = d['schedule-config'] || {};
  const state = d['game-state'] || {};
  const activities = config.activities || {};
  const categories = config.categories || {};
  const unlocked = new Set(state.unlocked_activities || []);
  const custom = state.custom_activities || {};
  const allActs = { ...activities, ...custom };

  const STAT_NAMES = {
    stamina: '체력', intelligence: '지력', elegance: '기품', charm: '매력',
    morals: '도덕', sensitivity: '감수성', faith: '신앙', combat: '무술',
    etiquette: '예절', cooking: '요리', art: '예술', music: '음악',
    stress: '스트레스', attack: '공격', defense: '방어', magic_power: '마력',
    hp: 'HP', reputation: '평판'
  };

  // 카테고리별 활동 분류
  const byCat = {};
  for (const [id, act] of Object.entries(allActs)) {
    const cat = act.category || 'rest';
    if (!byCat[cat]) byCat[cat] = [];
    byCat[cat].push({ id, ...act, _unlocked: unlocked.has(id), _custom: !!custom[id] });
  }

  const catOrder = ['study','martial','arts','etiquette','faith','cooking','magic','job','adventure','rest'];
  const tabBar = shadow.querySelector('#tabBar');
  const tabContent = shadow.querySelector('#tabContent');
  let first = true;

  for (const catKey of catOrder) {
    const items = byCat[catKey];
    if (!items || items.length === 0) continue;
    const catInfo = categories[catKey] || { name: catKey, icon: '' };

    // 탭 버튼
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (first ? ' active' : '');
    btn.dataset.cat = catKey;
    btn.textContent = `${catInfo.icon} ${catInfo.name}`;
    tabBar.appendChild(btn);

    // 탭 패널
    const panel = document.createElement('div');
    panel.className = 'tab-panel' + (first ? ' active' : '');
    panel.id = 'panel-' + catKey;

    // 해금된 것 먼저, 잠긴 것 나중
    items.sort((a, b) => (b._unlocked ? 1 : 0) - (a._unlocked ? 1 : 0));

    for (const act of items) {
      const card = document.createElement('div');
      card.className = 'activity-card' + (act._unlocked ? '' : ' locked');

      // 비용 표시
      let costHtml = '';
      if (act.pay) {
        costHtml = `<span class="act-cost income">+${act.pay[0]}~${act.pay[1]}G</span>`;
      } else if (act.cost > 0) {
        costHtml = `<span class="act-cost gold">${act.cost}G</span>`;
      } else {
        costHtml = `<span class="act-cost free">무료</span>`;
      }

      // 효과 태그
      let effectsHtml = '';
      const effects = { ...(act.effects || {}), ...(act.stat_bonus || {}) };
      for (const [stat, range] of Object.entries(effects)) {
        const name = STAT_NAMES[stat] || stat;
        const isNeg = range[0] < 0 || (stat === 'stress' && range[0] > 0);
        const cls = isNeg ? 'negative' : 'positive';
        const sign = range[0] >= 0 ? '+' : '';
        effectsHtml += `<span class="effect-tag ${cls}">${name} ${sign}${range[0]}~${sign}${range[1]}</span>`;
      }
      if (act.side_effects) {
        for (const [stat, range] of Object.entries(act.side_effects)) {
          const name = STAT_NAMES[stat] || stat;
          effectsHtml += `<span class="effect-tag negative">${name} ${range[0]}~${range[1]}</span>`;
        }
      }

      // 잠김 조건
      let reqHtml = '';
      if (!act._unlocked && act.requirements) {
        const reqs = Object.entries(act.requirements).map(([k, v]) => {
          const name = k === 'age' ? '나이' : (k === 'hp_min' ? 'HP' : (STAT_NAMES[k] || k));
          const current = k === 'age' ? d.age : (d[k] || 0);
          const met = current >= v;
          return `<span class="req-tag" style="${met ? 'opacity:0.5' : ''}">${name} ${v}${met ? ' ✓' : ''}</span>`;
        }).join('');
        reqHtml = `<div class="act-requirements">🔒 ${reqs}</div>`;
      }

      const lockIcon = act._unlocked ? '' : '<span class="lock-icon">🔒</span>';
      const customBadge = act._custom ? '<span class="custom-badge">특수</span>' : '';

      card.innerHTML = `
        <div class="act-header">
          <span class="act-name">${lockIcon}${act.name}${customBadge}</span>
          ${costHtml}
        </div>
        <div class="act-desc">${act.description || ''}</div>
        <div class="act-effects">${effectsHtml}</div>
        ${reqHtml}
      `;
      panel.appendChild(card);
    }

    tabContent.appendChild(panel);
    first = false;
  }

  // 탭 전환
  shadow.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      shadow.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      shadow.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      shadow.querySelector('#panel-' + btn.dataset.cat)?.classList.add('active');
    });
  });
</script>
