<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');

  :host {
    font-family: 'Noto Sans KR', sans-serif;
    display: block;
    width: 100%;
  }

  .pm {
    background: #1c1528;
    border: 1px solid rgba(232,160,191,0.18);
    border-radius: 16px;
    overflow: hidden;
    box-shadow:
      0 0 0 1px rgba(232,160,191,0.04),
      inset 0 1px 0 rgba(255,255,255,0.03),
      0 16px 56px rgba(0,0,0,0.6);
  }

  /* ═══ HEADER ═══ */
  .pm-hdr {
    padding: 16px 24px 12px;
    text-align: center;
    background: linear-gradient(180deg, rgba(232,160,191,0.05) 0%, transparent 100%);
    border-bottom: 1px solid rgba(232,160,191,0.08);
  }
  .pm-hdr-title {
    font-size: 14px;
    font-weight: 900;
    color: #e8a0bf;
    letter-spacing: 4px;
  }
  .pm-hdr-title::before,
  .pm-hdr-title::after {
    content: '◆';
    font-size: 7px;
    vertical-align: middle;
    margin: 0 10px;
    opacity: 0.35;
  }
  .pm-hdr-info {
    margin-top: 6px;
    font-size: 12px;
    color: #9988aa;
    display: flex;
    justify-content: center;
    gap: 16px;
  }
  .pm-gold { color: #f5d76e; font-weight: 600; }

  /* ═══ BODY ═══ */
  .pm-body {
    display: flex;
    min-height: 250px;
    max-height: 50vh;
  }

  /* --- Left tabs --- */
  .pm-side {
    width: 78px;
    flex-shrink: 0;
    background: rgba(0,0,0,0.2);
    border-right: 1px solid rgba(232,160,191,0.05);
    display: flex;
    flex-direction: column;
    padding: 8px 0;
  }
  .pm-tab {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 5px;
    padding: 14px 4px;
    border: none;
    background: transparent;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
    border-left: 3px solid transparent;
    position: relative;
  }
  .pm-tab + .pm-tab::before {
    content: '';
    position: absolute;
    top: 0;
    left: 14px;
    right: 14px;
    height: 1px;
    background: rgba(255,255,255,0.03);
  }
  .pm-tab:hover { background: rgba(255,255,255,0.02); }
  .pm-tab-ico {
    font-size: 28px;
    filter: grayscale(0.3);
    transition: all 0.15s;
  }
  .pm-tab:hover .pm-tab-ico,
  .pm-tab.active .pm-tab-ico { filter: grayscale(0); transform: scale(1.08); }
  .pm-tab-nm { font-size: 11px; font-weight: 700; color: #554466; transition: color 0.15s; }
  .pm-tab-ct {
    font-size: 9px;
    color: #3d3350;
    padding: 1px 6px;
    border-radius: 8px;
    background: rgba(255,255,255,0.02);
  }

  .pm-tab[data-tab="training"].active {
    background: rgba(91,156,245,0.06);
    border-left-color: #5b9cf5;
  }
  .pm-tab[data-tab="training"].active .pm-tab-nm { color: #8bbcff; }
  .pm-tab[data-tab="training"].active .pm-tab-ct { color: #6ea4f5; background: rgba(91,156,245,0.08); }

  .pm-tab[data-tab="work"].active {
    background: rgba(245,215,110,0.06);
    border-left-color: #f5d76e;
  }
  .pm-tab[data-tab="work"].active .pm-tab-nm { color: #f5d76e; }
  .pm-tab[data-tab="work"].active .pm-tab-ct { color: #d4b85e; background: rgba(245,215,110,0.08); }

  .pm-tab[data-tab="leisure"].active {
    background: rgba(77,204,122,0.06);
    border-left-color: #4dcc7a;
  }
  .pm-tab[data-tab="leisure"].active .pm-tab-nm { color: #6ee09a; }
  .pm-tab[data-tab="leisure"].active .pm-tab-ct { color: #4dcc7a; background: rgba(77,204,122,0.08); }

  /* --- Right grid --- */
  .pm-main {
    flex: 1;
    padding: 12px 14px;
    overflow-y: auto;
    min-height: 0;
  }
  .pm-main::-webkit-scrollbar { width: 3px; }
  .pm-main::-webkit-scrollbar-track { background: transparent; }
  .pm-main::-webkit-scrollbar-thumb { background: rgba(232,160,191,0.1); border-radius: 2px; }

  .pm-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
    gap: 8px;
    width: 100%;
    align-content: start;
  }
  .pm-empty {
    grid-column: 1 / -1;
    text-align: center;
    padding: 48px 20px;
    color: #3d3350;
    font-size: 12px;
  }

  /* --- Cards --- */
  .pm-card {
    background: rgba(255,255,255,0.025);
    border: 1px solid rgba(255,255,255,0.04);
    border-radius: 10px;
    padding: 10px 6px 8px;
    text-align: center;
    cursor: pointer;
    transition: all 0.13s ease-out;
    position: relative;
  }
  .pm-card::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 10px;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
    pointer-events: none;
  }
  .pm-card:hover:not(.full) {
    background: rgba(232,160,191,0.1);
    border-color: rgba(232,160,191,0.22);
    transform: translateY(-3px);
    box-shadow: 0 6px 20px rgba(0,0,0,0.35), 0 0 10px rgba(232,160,191,0.06);
  }
  .pm-card:active:not(.full) {
    transform: translateY(0) scale(0.95);
    transition-duration: 0.05s;
  }
  .pm-card.full { opacity: 0.3; cursor: default; pointer-events: none; }
  .pm-card.pricey .pm-cost { color: #f08098 !important; }
  .pm-card.wished {
    border-color: rgba(255,200,100,0.3);
    background: rgba(255,200,100,0.05);
    box-shadow: 0 0 8px rgba(255,200,100,0.08);
  }
  .pm-card.wished::before {
    content: '💭';
    position: absolute;
    top: -4px;
    right: -2px;
    font-size: 10px;
    filter: drop-shadow(0 0 2px rgba(255,200,100,0.5));
  }
  .pm-card.wished:hover:not(.full) {
    border-color: rgba(255,200,100,0.45);
    background: rgba(255,200,100,0.1);
  }

  .pm-card-ico { font-size: 26px; line-height: 1.2; display: block; }
  .pm-card-nm {
    font-size: 10px;
    color: #c8c0d5;
    margin-top: 3px;
    line-height: 1.3;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .pm-cost { font-size: 9px; margin-top: 2px; font-weight: 600; }
  .pm-cost.earn { color: #6ee09a; }
  .pm-cost.spend { color: #f5d76e; }
  .pm-cost.free { color: #443355; }

  /* ═══ FOOTER ═══ */
  .pm-foot {
    border-top: 1px solid rgba(232,160,191,0.08);
    padding: 14px 20px 18px;
    background: rgba(0,0,0,0.08);
  }

  /* Wish */
  .pm-wish {
    background: rgba(232,160,191,0.04);
    border: 1px solid rgba(232,160,191,0.08);
    border-radius: 8px;
    padding: 7px 12px;
    font-size: 11px;
    color: #c8a8bb;
    display: flex;
    align-items: center;
    gap: 7px;
    margin-bottom: 12px;
  }

  /* Competitions */
  .pm-comp {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
    align-items: center;
    margin-bottom: 12px;
  }
  .pm-comp-lbl { font-size: 10px; color: #f5d76e; font-weight: 600; }
  .pm-comp-btn {
    background: rgba(245,215,110,0.06);
    border: 1px solid rgba(245,215,110,0.15);
    border-radius: 6px;
    padding: 3px 10px;
    font-size: 10px;
    color: #f5d76e;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
  }
  .pm-comp-btn:hover { background: rgba(245,215,110,0.15); }
  .pm-comp-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Slots */
  .pm-slots {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 14px;
  }
  .pm-slot {
    flex: 1;
    background: rgba(0,0,0,0.25);
    border: 2px dashed rgba(232,160,191,0.08);
    border-radius: 10px;
    padding: 8px 6px;
    text-align: center;
    min-height: 56px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 2px;
    transition: all 0.2s;
    position: relative;
    box-shadow: inset 0 2px 8px rgba(0,0,0,0.25);
  }
  .pm-slot.target {
    border-color: rgba(232,160,191,0.35);
    border-style: solid;
    animation: pulse 2s ease-in-out infinite;
  }
  .pm-slot.filled {
    border-color: rgba(232,160,191,0.2);
    border-style: solid;
    background: rgba(232,160,191,0.03);
    box-shadow: inset 0 1px 4px rgba(0,0,0,0.15);
  }
  .pm-slot.done {
    border-color: rgba(77,204,122,0.2);
    border-style: solid;
    background: rgba(77,204,122,0.03);
    opacity: 0.6;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: inset 0 2px 8px rgba(0,0,0,0.25); }
    50% { box-shadow: inset 0 2px 8px rgba(0,0,0,0.25), 0 0 14px rgba(232,160,191,0.08); }
  }
  .pm-slot-lbl { font-size: 9px; color: #665577; position: absolute; top: 3px; left: 7px; }
  .pm-slot-ico { font-size: 18px; line-height: 1; }
  .pm-slot-nm { font-size: 10px; color: #f0e8f5; font-weight: 500; }
  .pm-slot-em { font-size: 22px; color: #231d33; }
  .pm-arr { font-size: 10px; color: #2d2440; flex-shrink: 0; }

  .pm-slot-acts {
    display: flex;
    gap: 4px;
    flex-shrink: 0;
  }
  .pm-sbtn {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(232,160,191,0.06);
    border-radius: 6px;
    width: 30px;
    height: 30px;
    font-size: 13px;
    color: #665577;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
  }
  .pm-sbtn:hover:not(:disabled) {
    background: rgba(232,160,191,0.1);
    color: #e8a0bf;
    border-color: rgba(232,160,191,0.2);
  }
  .pm-sbtn:disabled { opacity: 0.15; cursor: not-allowed; }

  /* Action */
  .pm-btn {
    border: none;
    border-radius: 10px;
    padding: 11px 20px;
    font-size: 14px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    width: 100%;
  }
  .pm-btn:active { transform: scale(0.98); }
  .pm-btn:disabled { opacity: 0.2; cursor: not-allowed; transform: none; }
  .pm-btn-main {
    background: linear-gradient(135deg, #e8a0bf 0%, #c07a9a 100%);
    color: #1a1425;
    box-shadow: 0 2px 8px rgba(232,160,191,0.12);
  }
  .pm-btn-main:hover:not(:disabled) {
    background: linear-gradient(135deg, #f0b0cf 0%, #d08aaa 100%);
    box-shadow: 0 4px 24px rgba(232,160,191,0.25);
    transform: translateY(-1px);
  }


</style>

<!-- {{turn_phase}}:{{current_slot}}:{{schedule_1}}:{{schedule_2}}:{{schedule_3}}:{{gold}}:{{current_month}}:{{current_year}} -->
<div class="pm" id="pm"></div>

<script>
  const d = __panelBridge.data;
  const el = shadow.querySelector('#pm');

  const config = d['schedule-config'] || {};
  const gstate = d['game-state'] || {};
  const evCfg = d['events-config'] || {};
  const acts = config.activities || {};
  const cats = config.categories || {};
  const unlocked = new Set(gstate.unlocked_activities || []);
  const custom = gstate.custom_activities || {};
  const darkPath = gstate.dark_path || false;
  const allRaw = { ...acts, ...custom };
  // Filter out dark_only activities when dark_path is off
  const all = {};
  for (const [id, act] of Object.entries(allRaw)) {
    if (act.dark_only && !darkPath) continue;
    all[id] = act;
  }

  const phase = d.turn_phase || 'setup';
  const cur = d.current_slot || 0;
  const isExec = phase === 'executing';

  const LBL = ['','상순','중순','하순'];
  const ICO = {
    private_school:'📚', royal_academy:'🏛️',
    martial_dojo:'🥋', sword_dojo:'⚔️', knight_training:'🛡️',
    art_class:'🎨', music_class:'🎵', dance_class:'💃',
    etiquette_school:'👑', royal_protocol:'🏰',
    theology:'⛪', temple_training:'🙏',
    cooking_basic:'🍳', cooking_advanced:'🧁', magic_school:'🔮',
    job_inn:'🍺', job_farm:'🌾', job_shop:'🏪', job_ranch:'🐑',
    job_church:'⛪', job_gravekeeper:'💀', job_palace_maid:'👸', job_hunter:'🏹',
    job_errand_quarter:'🏮', job_bathhouse:'🛁', job_tavern_night:'🌙', job_entertainment:'🏮',
    job_noble_attendant:'💎', job_massage:'💆', job_dancer:'💃',
    job_pleasure_house:'🔴', job_patron_companion:'🥂',
    job_potion_brewing:'⚗️', job_secret_model:'🎭',
    adventure_plains:'🌿', adventure_forest:'🌲', adventure_mountain:'⛰️',
    adventure_desert:'🏜️', adventure_ruins:'🏚️',
    rest:'😴', free_time:'🎈', vacation:'🏖️'
  };
  const SUP = {
    training: { name:'공부', ico:'📚', subs:['study','martial','arts','etiquette','faith','cooking','magic'] },
    work:     { name:'알바', ico:'💰', subs:['job'] },
    leisure:  { name:'휴식', ico:'🏠', subs:['adventure','rest'] }
  };

  const slots = [d.schedule_1||'none', d.schedule_2||'none', d.schedule_3||'none'];
  // Slots below current_slot are locked (already executed)
  const locked = cur;  // number of locked slots (0, 1, or 2)
  const filled = slots.filter((s, i) => i >= locked && s !== 'none').length;
  const nextE = slots.findIndex((s, i) => i >= locked && s === 'none');
  const sk = 'pm_tab_' + (__panelBridge.sessionId || '');
  const savedTab = (typeof sessionStorage !== 'undefined' && sessionStorage.getItem(sk)) || 'training';

  let h = '';

  // HEADER
  h += `<div class="pm-hdr">
    <div class="pm-hdr-title">스케줄 설정</div>
    <div class="pm-hdr-info">
      <span>${d.current_year}년차 ${d.current_month}월 · ${d.season}</span>
      <span class="pm-gold">💰 ${(d.gold||0).toLocaleString()}G</span>
    </div>
  </div>`;

  // ──── ALWAYS EDITABLE ────
  {
    h += '<div class="pm-body">';

    // Left tabs
    h += '<div class="pm-side">';
    for (const [k, cat] of Object.entries(SUP)) {
      let n = 0;
      for (const sub of cat.subs)
        for (const [id, a] of Object.entries(all))
          if (a.category === sub && unlocked.has(id)) n++;
      h += `<button class="pm-tab ${k===savedTab?'active':''}" data-tab="${k}">
        <span class="pm-tab-ico">${cat.ico}</span>
        <span class="pm-tab-nm">${cat.name}</span>
        <span class="pm-tab-ct">${n}개</span>
      </button>`;
    }
    h += '</div>';

    // Activity grid
    h += '<div class="pm-main">';
    for (const [tk, cat] of Object.entries(SUP)) {
      const vis = tk === savedTab ? '' : 'display:none';
      h += `<div class="pm-grid" data-tc="${tk}" style="${vis}">`;
      const list = [];
      for (const sub of cat.subs)
        for (const [id, a] of Object.entries(all))
          if (a.category === sub && unlocked.has(id)) list.push({ id, ...a });

      if (!list.length) h += '<div class="pm-empty">해금된 활동이 없습니다</div>';

      for (const a of list) {
        const noSlot = nextE === -1;
        const pricey = a.cost > 0 && a.cost > (d.gold||0);
        const wished = d.wish_activity && a.category === d.wish_activity;
        let cls = 'pm-card';
        if (noSlot) cls += ' full';
        if (pricey) cls += ' pricey';
        if (wished) cls += ' wished';
        const ico = ICO[a.id] || cats[a.category]?.icon || '📌';
        let cH = '';
        if (a.pay) cH = `<div class="pm-cost earn">+${a.pay[0]}~${a.pay[1]}G</div>`;
        else if (a.cost > 0) cH = `<div class="pm-cost spend">${a.cost}G</div>`;
        else cH = '<div class="pm-cost free">무료</div>';
        h += `<div class="${cls}" data-act="${a.id}" title="${a.description||''}">
          <span class="pm-card-ico">${ico}</span>
          <div class="pm-card-nm">${a.name}</div>${cH}
        </div>`;
      }
      h += '</div>';
    }
    h += '</div></div>';

    // FOOTER
    h += '<div class="pm-foot">';
    if (d.wish_text)
      h += `<div class="pm-wish"><span>💭</span><span>${d.wish_text}</span></div>`;

    const se = evCfg.seasonal_events || {};
    const mE = se[String(d.current_month)];
    const entered = (gstate.competitions_entered || []);
    const allComps = [...(mE?.competitions || []), ...((gstate.dark_path && mE?.dark_competitions) ? mE.dark_competitions.filter(c => !c.age_min || (d.age||10) >= c.age_min) : [])];
    const alreadyEnteredOne = entered.length > 0;
    if (allComps.length > 0) {
      h += '<div class="pm-comp"><span class="pm-comp-lbl">🏆 대회 (1개 선택):</span>';
      for (const c of allComps) {
        const done = entered.includes(c.id);
        const locked = !done && alreadyEnteredOne;
        h += `<button class="pm-comp-btn" data-cid="${c.id}" data-cn="${c.name}" data-cat="${c.category||''}" ${done||locked?'disabled':''}>${done ? '✓ '+c.name : c.name}</button>`;
      }
      h += '</div>';
    }

    // Slots
    h += '<div class="pm-slots">';
    for (let i = 0; i < 3; i++) {
      const aid = slots[i], act = aid !== 'none' ? all[aid] : null;
      const isLocked = i < locked;
      let cls = 'pm-slot';
      if (isLocked) cls += ' done';
      else if (i === nextE) cls += ' target';
      else if (act) cls += ' filled';
      h += `<div class="${cls}"><span class="pm-slot-lbl">${LBL[i+1]}</span>`;
      if (isLocked && act) {
        h += `<span class="pm-slot-ico">${ICO[aid]||'📌'}</span><span class="pm-slot-nm" style="opacity:0.5">✓ ${act.name}</span>`;
      } else if (act) {
        h += `<span class="pm-slot-ico">${ICO[aid]||'📌'}</span><span class="pm-slot-nm">${act.name}</span>`;
      } else {
        h += '<span class="pm-slot-em">·</span>';
      }
      h += '</div>';
      if (i < 2) h += '<span class="pm-arr">▸</span>';
    }
    h += `<div class="pm-slot-acts">
      <button class="pm-sbtn" id="undoBtn" ${filled===0?'disabled':''} title="되돌리기">⌫</button>
      <button class="pm-sbtn" id="clearBtn" ${filled===0?'disabled':''} title="초기화">✕</button>
    </div></div>`;

    const btnLabel = isExec ? '▶ 스케줄 재확정' : '▶ 스케줄 확정';
    h += `<button class="pm-btn pm-btn-main" id="advBtn" ${filled>0?'':'disabled'}>${btnLabel}</button>`;
    h += '</div>';
  }

  el.innerHTML = h;

  // ═══ EVENTS ═══

  shadow.querySelectorAll('.pm-tab').forEach(t => {
    t.addEventListener('click', () => {
      const id = t.dataset.tab;
      if (typeof sessionStorage !== 'undefined') sessionStorage.setItem(sk, id);
      shadow.querySelectorAll('.pm-tab').forEach(x => x.classList.toggle('active', x.dataset.tab === id));
      shadow.querySelectorAll('.pm-grid[data-tc]').forEach(x => x.style.display = x.dataset.tc === id ? '' : 'none');
    });
  });

  shadow.querySelectorAll('.pm-card:not(.full)').forEach(c => {
    c.addEventListener('click', () => {
      if (nextE === -1) return;
      const p = {}; p['schedule_' + (nextE + 1)] = c.dataset.act;
      __panelBridge.updateVariables(p);
    });
  });

  shadow.querySelector('#undoBtn')?.addEventListener('click', () => {
    for (let i = 2; i >= locked; i--) {
      if (slots[i] !== 'none') {
        const p = {}; p['schedule_' + (i + 1)] = 'none';
        __panelBridge.updateVariables(p);
        return;
      }
    }
  });

  shadow.querySelector('#clearBtn')?.addEventListener('click', () => {
    const p = {};
    for (let i = locked; i < 3; i++) p['schedule_' + (i + 1)] = 'none';
    __panelBridge.updateVariables(p);
  });

  shadow.querySelector('#advBtn')?.addEventListener('click', async function() {
    if (this.disabled) return;
    this.disabled = true;
    // Queue schedule info for AI awareness
    if (locked > 0) {
      // Mid-month modification — only report remaining (unlocked) slots
      const changes = [];
      for (let i = locked; i < 3; i++) {
        const aid = slots[i];
        const a = aid !== 'none' ? all[aid] : null;
        changes.push(`${LBL[i+1]}: ${a ? a.name : '(없음)'}`);
      }
      await __panelBridge.queueEvent(
        `[SCHEDULE_MODIFIED] ${d.current_year}년차 ${d.current_month}월 남은 스케줄 수정\n${changes.join('\n')}`
      );
    } else {
      // Fresh month — report all slots
      const sNames = slots.map((aid, i) => {
        const a = aid !== 'none' ? all[aid] : null;
        return `${LBL[i+1]}: ${a ? a.name : '(없음)'}`;
      });
      await __panelBridge.queueEvent(
        `[SCHEDULE_SET] ${d.current_year}년차 ${d.current_month}월 스케줄 확정\n${sNames.join('\n')}`
      );
    }
    // Transition to executing phase: close schedule modal, open advance dock
    // __refreshPanels forces advance panel to re-render with fresh turn_phase data
    await __panelBridge.updateVariables({
      turn_phase: 'executing',
      __refreshPanels: ['advance']
    });
    await __panelBridge.openModal('advance', true);
  });

  shadow.querySelectorAll('.pm-comp-btn').forEach(b => {
    b.addEventListener('click', async () => {
      // Store pending competition info: close schedule, open competition modal
      await __panelBridge.updateVariables({
        __competition_pending: { id: b.dataset.cid, name: b.dataset.cn, category: b.dataset.cat || '' }
      });
      await __panelBridge.openModal('competition', true);
    });
  });
</script>
