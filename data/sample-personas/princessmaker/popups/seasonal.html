<style>
@import url('https://fonts.googleapis.com/css2?family=Jua&display=swap');
:host { font-family: 'Jua', sans-serif; }
.popup-wrap { text-align: center; padding: 8px 0; position: relative; }
.banner { position: relative; z-index: 1; display: inline-block; padding: 6px 32px; margin-bottom: 8px; }
.banner::before, .banner::after { content: ''; position: absolute; top: 0; bottom: 0; width: 20px; }
.banner::before {
  left: -10px; opacity: 0.3;
  background: linear-gradient(135deg, transparent 33.3%, var(--popup-primary, #e8a0bf) 33.3%, var(--popup-primary, #e8a0bf) 66.6%, transparent 66.6%);
}
.banner::after {
  right: -10px; opacity: 0.3;
  background: linear-gradient(-135deg, transparent 33.3%, var(--popup-primary, #e8a0bf) 33.3%, var(--popup-primary, #e8a0bf) 66.6%, transparent 66.6%);
}
.deco-line { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 6px; position: relative; z-index: 1; }
.deco-line .line { width: 40px; height: 1px; background: linear-gradient(90deg, transparent, var(--popup-primary, #e8a0bf), transparent); }
.deco-line .diamond { font-size: 10px; color: var(--popup-primary, #e8a0bf); }
.event-icon {
  font-size: 44px; margin-bottom: 4px; position: relative; z-index: 1;
  animation: floatBob 2.5s ease-in-out infinite;
}
@keyframes floatBob {
  0%, 100% { transform: translateY(0) rotate(-2deg); }
  50% { transform: translateY(-6px) rotate(2deg); }
}
.event-name {
  font-size: 28px; font-weight: 900; position: relative; z-index: 1; color: #fff;
  text-shadow: 0 2px 12px var(--popup-glow, rgba(232,160,191,0.3));
}
.message {
  font-size: 14px; color: rgba(255,255,255,0.75); margin-top: 8px;
  position: relative; z-index: 1; line-height: 1.5;
  opacity: 0; animation: fadeUp 0.5s 0.3s ease-out forwards;
}
@keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 0.85; transform: translateY(0); } }
.petal-field { position: absolute; inset: -10px; pointer-events: none; z-index: 0; overflow: hidden; }
.petal { position: absolute; top: -10px; font-size: 14px; opacity: 0; animation: petalDrift 4s ease-in-out infinite; }
.petal:nth-child(1) { left: 10%; }
.petal:nth-child(2) { left: 30%; animation-delay: 1.0s; font-size: 10px; }
.petal:nth-child(3) { left: 55%; animation-delay: 0.5s; }
.petal:nth-child(4) { left: 75%; animation-delay: 1.5s; font-size: 12px; }
.petal:nth-child(5) { left: 90%; animation-delay: 2.0s; }
@keyframes petalDrift {
  0% { opacity: 0; transform: translateY(0) translateX(0) rotate(0deg); }
  15% { opacity: 0.6; }
  85% { opacity: 0.3; }
  100% { opacity: 0; transform: translateY(120px) translateX(20px) rotate(360deg); }
}
</style>
<div class="popup-wrap">
  <div class="petal-field">
    <span class="petal">🌸</span><span class="petal">✨</span><span class="petal">🌸</span><span class="petal">✨</span><span class="petal">🌸</span>
  </div>
  <div class="event-icon">🎆</div>
  <div class="deco-line"><span class="line"></span><span class="diamond">◆</span><span class="line"></span></div>
  <div class="event-name">{{event_name}}</div>
  <div class="message">{{message}}</div>
  <div class="deco-line" style="margin-top:10px; margin-bottom:0;"><span class="line"></span><span class="diamond">◆</span><span class="line"></span></div>
</div>
