<style>
  @import url('https://fonts.googleapis.com/css2?family=Jua&display=swap');
  :host { font-family: 'Jua', sans-serif; }

  .defeat { text-align: center; padding: 16px 12px; position: relative; overflow: hidden; }

  .icon {
    font-size: 52px;
    animation: fallDown 0.7s ease-in;
    filter: grayscale(0.3);
  }
  @keyframes fallDown { 0% { transform: translateY(-20px); opacity: 0; } 70% { transform: translateY(5px); } 100% { transform: translateY(0); opacity: 1; } }

  .title {
    font-size: 26px; font-weight: 800; margin: 8px 0 4px;
    color: #ff6b6b;
    text-shadow: 0 0 15px rgba(255,80,80,0.4), 0 2px 4px rgba(0,0,0,0.5);
    animation: dimPulse 2s ease infinite;
  }
  @keyframes dimPulse { 0%,100% { opacity: 1; } 50% { opacity: 0.7; } }

  .zone { font-size: 14px; color: #ccaaaa; margin-bottom: 4px; }
  .message { font-size: 13px; color: #aa8888; opacity: 0.85; }

  .crack {
    position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 80%; height: 3px;
    background: linear-gradient(90deg, transparent, rgba(255,80,80,0.5), transparent);
    animation: crackGlow 2s ease infinite;
  }
  @keyframes crackGlow { 0%,100% { opacity: 0.3; } 50% { opacity: 0.8; } }

  .vignette {
    position: absolute; inset: 0; pointer-events: none;
    background: radial-gradient(circle, transparent 40%, rgba(100,20,20,0.3) 100%);
  }
</style>

<div class="defeat">
  <div class="vignette"></div>
  <div class="icon">💫</div>
  <div class="title">전투 패배...</div>
  <div class="zone">{{zone_name}}</div>
  <div class="message">체력이 바닥나 후퇴했다</div>
  <div class="crack"></div>
</div>
