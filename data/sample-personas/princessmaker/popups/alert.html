<style>
@import url('https://fonts.googleapis.com/css2?family=Jua&display=swap');
:host { font-family: 'Jua', sans-serif; }
.popup-wrap { text-align: center; padding: 8px 0; position: relative; border-radius: 12px; }
.warning-border {
  position: absolute; inset: -24px; border-radius: 16px; z-index: 0;
  border: 2px solid transparent; pointer-events: none;
  background: linear-gradient(var(--bg, #1a1425), var(--bg, #1a1425)) padding-box,
              linear-gradient(135deg, #ff4444, #ff8844, #ff4444) border-box;
  animation: borderPulse 1.5s ease-in-out infinite;
}
@keyframes borderPulse { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }
.alert-glow {
  position: absolute; inset: -24px; border-radius: 16px; z-index: 0;
  box-shadow: inset 0 0 30px rgba(255, 68, 68, 0.15);
  pointer-events: none; animation: glowPulse 1.5s ease-in-out infinite;
}
@keyframes glowPulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.7; } }
.alert-icon { font-size: 44px; position: relative; z-index: 1; animation: alertShake 0.6s ease-out; }
@keyframes alertShake {
  0% { transform: translateX(0); }
  15% { transform: translateX(-8px) rotate(-5deg); }
  30% { transform: translateX(8px) rotate(5deg); }
  45% { transform: translateX(-5px) rotate(-3deg); }
  60% { transform: translateX(5px) rotate(3deg); }
  75% { transform: translateX(-2px); }
  100% { transform: translateX(0); }
}
.alert-title {
  font-size: 26px; font-weight: 900; position: relative; z-index: 1; margin-top: 4px;
  background: linear-gradient(135deg, #ff6b6b, #ffaa44);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text; filter: drop-shadow(0 2px 8px rgba(255, 80, 50, 0.4));
}
.alert-message {
  font-size: 15px; color: rgba(255,220,200,0.9); margin-top: 10px;
  position: relative; z-index: 1; line-height: 1.5;
  opacity: 0; animation: fadeIn 0.4s 0.3s ease-out forwards;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.danger-bar {
  margin-top: 12px; height: 3px; border-radius: 2px; position: relative; z-index: 1;
  background: linear-gradient(90deg, transparent 0%, #ff4444 20%, #ff8844 50%, #ff4444 80%, transparent 100%);
  background-size: 200% 100%; animation: dangerSweep 2s linear infinite;
}
@keyframes dangerSweep { from { background-position: 200% 0; } to { background-position: -200% 0; } }
</style>
<div class="popup-wrap">
  <div class="warning-border"></div>
  <div class="alert-glow"></div>
  <div class="alert-icon">⚠️</div>
  <div class="alert-title">{{title}}</div>
  <div class="alert-message">{{message}}</div>
  <div class="danger-bar"></div>
</div>
