<style>
@import url('https://fonts.googleapis.com/css2?family=Jua&display=swap');
:host { font-family: 'Jua', sans-serif; }
.popup-wrap { text-align: center; padding: 8px 0; position: relative; overflow: hidden; }
.confetti-field { position: absolute; inset: -10px; pointer-events: none; z-index: 0; }
.confetti {
  position: absolute; top: -8px; width: 6px; height: 6px; border-radius: 50%;
  opacity: 0; animation: confettiFall 2.5s ease-in infinite;
}
.confetti:nth-child(1) { left: 8%; background: #ff6b9d; }
.confetti:nth-child(2) { left: 20%; background: #ffd43b; animation-delay: 0.3s; width: 4px; height: 8px; border-radius: 2px; }
.confetti:nth-child(3) { left: 35%; background: #74c0fc; animation-delay: 0.6s; }
.confetti:nth-child(4) { left: 50%; background: #69db7c; animation-delay: 0.15s; width: 4px; height: 8px; border-radius: 2px; }
.confetti:nth-child(5) { left: 65%; background: #b197fc; animation-delay: 0.45s; }
.confetti:nth-child(6) { left: 78%; background: #ffa94d; animation-delay: 0.75s; width: 4px; height: 8px; border-radius: 2px; }
.confetti:nth-child(7) { left: 90%; background: #ff6b6b; animation-delay: 0.9s; }
.confetti:nth-child(8) { left: 42%; background: #e8a0bf; animation-delay: 1.1s; }
@keyframes confettiFall {
  0% { opacity: 0; transform: translateY(0) rotate(0deg); }
  10% { opacity: 1; }
  100% { opacity: 0; transform: translateY(130px) rotate(720deg); }
}
.cake-icon {
  font-size: 48px; margin-bottom: 2px; position: relative; z-index: 1;
  animation: cakeBounce 0.7s ease-out;
}
@keyframes cakeBounce {
  0% { transform: scale(0) rotate(-20deg); }
  50% { transform: scale(1.2) rotate(5deg); }
  70% { transform: scale(0.95) rotate(-2deg); }
  100% { transform: scale(1) rotate(0); }
}
.title {
  font-size: 28px; font-weight: 900; position: relative; z-index: 1;
  background: linear-gradient(135deg, #ffb6d9, #ffd6ec, #ffb6d9);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  filter: drop-shadow(0 2px 6px rgba(255, 150, 200, 0.4));
}
.name-age {
  font-size: 22px; font-weight: 700; color: #fff; position: relative; z-index: 1;
  margin-top: 6px; opacity: 0; animation: fadeUp 0.5s 0.3s ease-out forwards;
}
.name-age .age-num {
  font-size: 32px;
  background: linear-gradient(135deg, #ffd700, #ffaa00);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text; filter: drop-shadow(0 1px 4px rgba(255, 200, 0, 0.4));
}
.heart-row { margin-top: 6px; position: relative; z-index: 1; opacity: 0; animation: fadeIn 0.4s 0.6s ease-out forwards; }
.heart-row span { display: inline-block; font-size: 14px; margin: 0 2px; animation: heartPop 0.6s ease-out backwards; }
.heart-row span:nth-child(1) { animation-delay: 0.7s; }
.heart-row span:nth-child(2) { animation-delay: 0.8s; }
.heart-row span:nth-child(3) { animation-delay: 0.9s; }
.heart-row span:nth-child(4) { animation-delay: 1.0s; }
.heart-row span:nth-child(5) { animation-delay: 1.1s; }
@keyframes heartPop { 0% { transform: scale(0); } 60% { transform: scale(1.4); } 100% { transform: scale(1); } }
@keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
</style>
<div class="popup-wrap">
  <div class="confetti-field">
    <div class="confetti"></div><div class="confetti"></div><div class="confetti"></div><div class="confetti"></div>
    <div class="confetti"></div><div class="confetti"></div><div class="confetti"></div><div class="confetti"></div>
  </div>
  <div class="cake-icon">🎂</div>
  <div class="title">생일 축하!</div>
  <div class="name-age">{{name}} <span class="age-num">{{age}}</span>세</div>
  <div class="heart-row">
    <span>💖</span><span>💖</span><span>💖</span><span>💖</span><span>💖</span>
  </div>
</div>
