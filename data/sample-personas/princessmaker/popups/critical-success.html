<style>
@import url('https://fonts.googleapis.com/css2?family=Jua&display=swap');
:host { font-family: 'Jua', sans-serif; }
.popup-wrap { text-align: center; padding: 8px 0; position: relative; overflow: visible; }
.sparkle-field { position: absolute; inset: -20px; pointer-events: none; z-index: 0; }
.sparkle { position: absolute; font-size: 18px; opacity: 0; animation: sparkleFloat 1.5s ease-in-out infinite; }
.sparkle:nth-child(1) { top: 5%; left: 10%; }
.sparkle:nth-child(2) { top: 15%; right: 8%; animation-delay: 0.3s; }
.sparkle:nth-child(3) { bottom: 10%; left: 20%; animation-delay: 0.6s; }
.sparkle:nth-child(4) { top: 40%; right: 15%; animation-delay: 0.9s; }
.sparkle:nth-child(5) { bottom: 20%; right: 25%; animation-delay: 1.2s; }
.sparkle:nth-child(6) { top: 8%; left: 50%; animation-delay: 0.15s; }
@keyframes sparkleFloat {
  0%, 100% { opacity: 0; transform: scale(0.5) rotate(0deg); }
  50% { opacity: 1; transform: scale(1.2) rotate(180deg); }
}
.icon { font-size: 48px; margin-bottom: 4px; position: relative; z-index: 1; animation: iconBounce 0.6s ease-out; }
@keyframes iconBounce {
  0% { transform: scale(0) rotate(-30deg); }
  60% { transform: scale(1.3) rotate(5deg); }
  100% { transform: scale(1) rotate(0deg); }
}
.title {
  font-size: 32px; font-weight: 900; position: relative; z-index: 1;
  background: linear-gradient(135deg, #ffd700, #fff7a0, #ffb300, #ffe066);
  background-size: 200% 100%;
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text; text-shadow: none;
  filter: drop-shadow(0 2px 8px rgba(255, 215, 0, 0.5));
  animation: shimmerGold 2s linear infinite;
}
@keyframes shimmerGold { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
.subtitle {
  font-size: 15px; color: #fff8dc; margin-top: 8px; position: relative; z-index: 1;
  opacity: 0; animation: fadeUp 0.5s 0.3s ease-out forwards;
}
@keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.glow-ring {
  position: absolute; top: 50%; left: 50%; width: 120px; height: 120px;
  transform: translate(-50%, -60%); border-radius: 50%; z-index: 0;
  background: radial-gradient(circle, rgba(255,215,0,0.3) 0%, transparent 70%);
  animation: ringPulse 1.5s ease-in-out infinite;
}
@keyframes ringPulse {
  0%, 100% { transform: translate(-50%, -60%) scale(0.8); opacity: 0.5; }
  50% { transform: translate(-50%, -60%) scale(1.4); opacity: 0; }
}
</style>
<div class="popup-wrap">
  <div class="sparkle-field">
    <span class="sparkle">✦</span><span class="sparkle">⭐</span><span class="sparkle">✦</span>
    <span class="sparkle">⭐</span><span class="sparkle">✦</span><span class="sparkle">⭐</span>
  </div>
  <div class="glow-ring"></div>
  <div class="icon">🌟</div>
  <div class="title">대성공!</div>
  <div class="subtitle">{{message}}</div>
</div>
