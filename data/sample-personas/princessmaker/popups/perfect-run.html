<style>
@import url('https://fonts.googleapis.com/css2?family=Jua&display=swap');
:host { font-family: 'Jua', sans-serif; }
.popup-wrap { text-align: center; padding: 8px 0; position: relative; overflow: visible; }
.rainbow-bar {
  position: absolute; top: -24px; left: -24px; right: -24px; height: 4px;
  background: linear-gradient(90deg, #ff6b6b, #ffa94d, #ffd43b, #69db7c, #74c0fc, #b197fc, #ff6b9d);
  background-size: 300% 100%; animation: rainbowScroll 2s linear infinite; border-radius: 2px;
}
@keyframes rainbowScroll { from { background-position: 0% 0; } to { background-position: 300% 0; } }
.sparkle-ring {
  position: absolute; top: 50%; left: 50%; width: 100px; height: 100px;
  transform: translate(-50%, -55%); pointer-events: none; z-index: 0;
}
.ring-dot {
  position: absolute; width: 6px; height: 6px; border-radius: 50%;
  background: #ffd700; opacity: 0; animation: orbitDot 2s ease-in-out infinite;
}
.ring-dot:nth-child(1) { top: 0; left: 50%; }
.ring-dot:nth-child(2) { top: 15%; right: 5%; animation-delay: 0.25s; background: #ff6b9d; }
.ring-dot:nth-child(3) { bottom: 15%; right: 5%; animation-delay: 0.5s; background: #74c0fc; }
.ring-dot:nth-child(4) { bottom: 0; left: 50%; animation-delay: 0.75s; background: #69db7c; }
.ring-dot:nth-child(5) { bottom: 15%; left: 5%; animation-delay: 1.0s; background: #ffa94d; }
.ring-dot:nth-child(6) { top: 15%; left: 5%; animation-delay: 1.25s; background: #b197fc; }
@keyframes orbitDot { 0%, 100% { opacity: 0; transform: scale(0.3); } 30%, 70% { opacity: 1; transform: scale(1); } }
.icon { font-size: 48px; margin-bottom: 2px; position: relative; z-index: 1; animation: crownFloat 2s ease-in-out infinite; }
@keyframes crownFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
.title {
  font-size: 30px; font-weight: 900; position: relative; z-index: 1;
  background: linear-gradient(90deg, #ff6b9d, #ffa94d, #ffd43b, #69db7c, #74c0fc, #b197fc, #ff6b9d);
  background-size: 300% 100%;
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  filter: drop-shadow(0 2px 6px rgba(255, 200, 100, 0.4));
  animation: rainbowText 3s linear infinite;
}
@keyframes rainbowText { from { background-position: 0% 0; } to { background-position: 300% 0; } }
.subtitle {
  font-size: 14px; color: #ffffff; margin-top: 8px; position: relative; z-index: 1;
  text-shadow: 0 1px 4px rgba(0,0,0,0.5), 0 0 8px rgba(255,200,100,0.3);
  opacity: 0; animation: fadeUp 0.5s 0.3s ease-out forwards;
}
@keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
</style>
<div class="popup-wrap">
  <div class="rainbow-bar"></div>
  <div class="sparkle-ring">
    <div class="ring-dot"></div><div class="ring-dot"></div><div class="ring-dot"></div>
    <div class="ring-dot"></div><div class="ring-dot"></div><div class="ring-dot"></div>
  </div>
  <div class="icon">👑</div>
  <div class="title">퍼펙트!</div>
  <div class="subtitle">{{message}}</div>
</div>
