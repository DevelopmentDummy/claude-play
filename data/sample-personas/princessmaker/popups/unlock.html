<style>
@import url('https://fonts.googleapis.com/css2?family=Jua&display=swap');
:host { font-family: 'Jua', sans-serif; }
.popup-wrap { text-align: center; padding: 8px 0; position: relative; }
.lock-icon { font-size: 44px; display: inline-block; position: relative; z-index: 1; animation: lockOpen 0.8s ease-out; }
@keyframes lockOpen {
  0% { transform: scale(1.2); filter: brightness(0.5) grayscale(1); }
  40% { transform: scale(1.2) rotate(-10deg); filter: brightness(0.5) grayscale(1); }
  50% { transform: scale(1.4) rotate(5deg); filter: brightness(1.5) grayscale(0); }
  70% { transform: scale(0.9); }
  100% { transform: scale(1); filter: brightness(1); }
}
.unlock-flash {
  position: absolute; top: 50%; left: 50%; width: 0; height: 0; transform: translate(-50%, -55%);
  border-radius: 50%; z-index: 0;
  background: radial-gradient(circle, rgba(232, 160, 191, 0.6) 0%, transparent 70%);
  animation: flashBurst 0.6s 0.3s ease-out forwards;
}
@keyframes flashBurst {
  0% { width: 0; height: 0; opacity: 1; }
  100% { width: 200px; height: 200px; opacity: 0; margin-left: -100px; margin-top: -100px; }
}
.label {
  font-size: 14px; color: var(--popup-primary, #e8a0bf); margin: 4px 0 2px;
  text-transform: uppercase; letter-spacing: 3px; font-weight: 700;
  position: relative; z-index: 1; opacity: 0; animation: fadeIn 0.4s 0.5s ease-out forwards;
}
.activity-name {
  font-size: 28px; font-weight: 900; position: relative; z-index: 1; color: #fff;
  text-shadow: 0 0 20px var(--popup-glow, rgba(232,160,191,0.3)), 0 0 40px var(--popup-glow, rgba(232,160,191,0.3));
  opacity: 0; animation: glowReveal 0.6s 0.6s ease-out forwards;
}
@keyframes glowReveal {
  0% { opacity: 0; transform: translateY(10px) scale(0.9); letter-spacing: 8px; }
  100% { opacity: 1; transform: translateY(0) scale(1); letter-spacing: 1px; }
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.shine-particles { position: absolute; inset: 0; pointer-events: none; z-index: 0; }
.shine {
  position: absolute; width: 4px; height: 4px; border-radius: 50%;
  background: var(--popup-primary, #e8a0bf); opacity: 0; animation: shineUp 1.2s ease-out infinite;
}
.shine:nth-child(1) { bottom: 20%; left: 15%; animation-delay: 0.5s; }
.shine:nth-child(2) { bottom: 30%; right: 20%; animation-delay: 0.8s; }
.shine:nth-child(3) { bottom: 15%; left: 45%; animation-delay: 1.1s; }
.shine:nth-child(4) { bottom: 25%; right: 35%; animation-delay: 0.65s; }
@keyframes shineUp {
  0% { opacity: 0; transform: translateY(0) scale(0); }
  30% { opacity: 1; transform: translateY(-15px) scale(1); }
  100% { opacity: 0; transform: translateY(-40px) scale(0.3); }
}
</style>
<div class="popup-wrap">
  <div class="unlock-flash"></div>
  <div class="shine-particles"><div class="shine"></div><div class="shine"></div><div class="shine"></div><div class="shine"></div></div>
  <div class="lock-icon">🔓</div>
  <div class="label">NEW UNLOCK</div>
  <div class="activity-name">{{activity_name}}</div>
</div>
